<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Security Assistant</title>
    <style>
        :root {
            --primary-green: #00ff41;
            --dark-bg: #0a0a0a;
            --panel-bg: #111;
            --border-style: 1px solid #222;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--primary-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        .main-container {
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            gap: 10px;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        .panel {
            background: var(--panel-bg);
            border: var(--border-style);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h2 { font-size: 0.9rem; border-bottom: 1px solid #333; padding-bottom: 5px; margin: 0; }

        .terminal-container {
            border: var(--border-style);
            background: black;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #terminal-log {
            flex-grow: 1;
            padding: 20px;
            font-size: 0.85rem;
            line-height: 1.4;
            overflow-y: auto;
        }

        .input-area {
            padding: 20px;
            border-top: var(--border-style);
            text-align: center;
        }

        button {
            background: var(--primary-green);
            color: black;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: bold;
            width: 85%;
        }

        /* --- MODAL DE CARTÕES --- */
        #modal-cartoes {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .card-selection {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .card-item {
            border: 2px solid var(--primary-green);
            padding: 20px;
            width: 160px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: #111;
        }

        .card-item:hover {
            background: var(--primary-green);
            color: black;
            transform: scale(1.05);
        }

        .card-item span { display: block; font-size: 0.6rem; margin-top: 5px; opacity: 0.8; }
    </style>
</head>
<body>

<div id="modal-cartoes">
    <h2 style="color: var(--primary-green); border: none;">APROXIME O CARTÃO NO LEITOR</h2>
    <div class="card-selection">
        <div class="card-item" onclick="accessSystem('ID-HT-1020')">
            <strong>NV 1</strong>
            <div>HEITOR</div>
            <span>ID: HT-1020</span>
        </div>
        <div class="card-item" onclick="accessSystem('ID-BS-2030')">
            <strong>NV 2</strong>
            <div>BEATRIZ</div>
            <span>ID: BS-2030</span>
        </div>
        <div class="card-item" onclick="accessSystem('ID-RR-3040')">
            <strong>NV 3</strong>
            <div>RICARDO</div>
            <span>ID: RR-3040</span>
        </div>
    </div>
    <button onclick="closeModal()" style="width: auto; margin-top: 30px; background: #333; color: #999;">VOLTAR</button>
</div>

<div class="main-container">
    <div class="panel">
        <div>
            <h2>SYSTEM STATUS</h2>
            <div style="font-size: 0.7rem; margin-top:10px;">ENCRYPTION: <span style="color:var(--primary-green)">ACTIVE</span></div>
        </div>
        <div>
            <h2>ACCESS LOGS</h2>
            <div id="access-history" style="font-size: 0.65rem;"></div>
        </div>
    </div>

    <div class="terminal-container">
        <div id="terminal-log">
            > NEXUS SECURITY ASSISTANT v2.0 <br>
            > AGUARDANDO AUTENTICAÇÃO...
        </div>
        <div class="input-area">
            <button onclick="openModal()">💳 LER CARTÃO</button>
        </div>
    </div>

    <div class="panel">
        <div>
            <h2>SECURITY</h2>
            <div style="font-size: 2rem; text-align: center; margin-top: 20px;">🔒</div>
            <div style="text-align: center; font-size: 0.7rem; color: red;">SISTEMA BLOQUEADO</div>
        </div>
    </div>
</div>

<script>
    const USERS = {
        "ID-HT-1020": { nome: "HEITOR TORRES", cargo: "PRODUÇÃO", id: "HT-1020", nivel: "1" },
        "ID-BS-2030": { nome: "BEATRIZ SOARES", cargo: "GERENTE", id: "BS-2030", nivel: "2" },
        "ID-RR-3040": { nome: "RICARDO ROCHA", cargo: "CHEFE", id: "RR-3040", nivel: "3" }
    };

    function openModal() { document.getElementById('modal-cartoes').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal-cartoes').style.display = 'none'; }

    function accessSystem(userId) {
        const user = USERS[userId];
        closeModal();
        
        // 1. Adiciona log no terminal principal
        const log = document.getElementById('terminal-log');
        log.innerHTML += `<br>> ACESSO SOLICITADO POR: ${user.id}`;
        log.innerHTML += `<br>> REDIRECIONANDO PARA DASHBOARD PRIVADO...`;

        // 2. Abre nova aba com os dados
        const novaAba = window.open('', '_blank');
        
        // Conteúdo da nova aba
        const htmlConteudo = `
            <html>
            <head>
                <title>PERFIL: ${user.nome}</title>
                <style>
                    body { 
                        background: #0a0a0a; 
                        color: #00ff41; 
                        font-family: 'Courier New', monospace; 
                        display: flex; 
                        justify-content: center; 
                        align-items: center; 
                        height: 100vh; 
                        margin: 0;
                        text-transform: uppercase;
                    }
                    .box { 
                        border: 2px solid #00ff41; 
                        padding: 40px; 
                        background: #111; 
                        box-shadow: 0 0 20px rgba(0,255,65,0.2);
                        min-width: 300px;
                    }
                    h1 { border-bottom: 1px solid #00ff41; padding-bottom: 10px; font-size: 1.2rem; }
                    .info { margin: 15px 0; font-size: 0.9rem; }
                    .label { color: #666; font-size: 0.7rem; display: block; }
                </style>
            </head>
            <body>
                <div class="box">
                    <h1>DADOS DO FUNCIONÁRIO</h1>
                    <div class="info"><span class="label">NOME COMPLETO:</span> ${user.nome}</div>
                    <div class="info"><span class="label">CARGO:</span> ${user.cargo}</div>
                    <div class="info"><span class="label">ID DE ACESSO:</span> ${user.id}</div>
                    <div class="info"><span class="label">NÍVEL DE SEGURANÇA:</span> 0${user.nivel}</div>
                    <div style="margin-top: 20px; font-size: 0.6rem; color: #00ff41; border-top: 1px solid #222; pt-10">
                        AUTENTICADO VIA NEXUS SECURITY
                    </div>
                </div>
            </body>
            </html>
        `;

        novaAba.document.write(htmlConteudo);
        novaAba.document.close();
    }
</script>
</body>
</html>
