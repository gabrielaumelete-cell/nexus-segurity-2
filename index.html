<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus OS - Network Simulation</title>
    <style>
        :root {
            --primary-green: #00ff41;
            --error-red: #ff0033;
            --dark-bg: #0a0a0a;
            --panel-bg: #111;
            --border-style: 1px solid #222;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--primary-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        .main-container {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 15px;
            width: 100%;
            max-width: 1400px;
            padding: 20px;
            box-sizing: border-box;
        }

        .panel {
            background: var(--panel-bg);
            border: var(--border-style);
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .terminal-container {
            border: var(--border-style);
            background: black;
            display: flex;
            flex-direction: column;
        }

        #terminal-log {
            flex-grow: 1;
            padding: 20px;
            font-size: 0.85rem;
            line-height: 1.4;
            overflow-y: auto;
        }

        .input-area {
            padding: 20px;
            border-top: var(--border-style);
            background: #050505;
            text-align: center;
        }

        button {
            background: transparent;
            color: var(--primary-green);
            border: 1px solid var(--primary-green);
            padding: 12px;
            cursor: pointer;
            width: 90%;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 0.75rem;
            transition: 0.2s;
        }

        button:hover { background: var(--primary-green); color: black; }
        .btn-danger { border-color: var(--error-red); color: var(--error-red); }

        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #000;
            border: 2px solid var(--primary-green);
            padding: 30px;
            width: 500px;
            text-align: center;
        }

        input {
            background: #0a0a0a;
            border: 1px solid var(--primary-green);
            color: var(--primary-green);
            padding: 12px;
            width: 80%;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 5px;
        }

        /* Barra de Progresso Hacker */
        .progress-container {
            width: 100%;
            border: 1px solid #333;
            height: 10px;
            margin: 10px 0;
            display: none;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--primary-green);
            transition: width 0.1s;
        }

        .geo-fake-data {
            font-size: 0.6rem;
            color: gold;
            margin-bottom: 15px;
            text-align: left;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div id="modal-overlay">
    <div id="m-start" class="modal-content" style="display:none">
        <h2>IDENTIFICAÇÃO DE TERMINAL</h2>
        <div style="font-size: 0.6rem; margin-bottom: 20px;">AVISO: SISTEMA EM MODO DE CONFIANÇA ZERO</div>
        <button onclick="stepMFA('ID-RR-3040')">LOGAR: RICARDO (CHEFE)</button>
        <button onclick="stepMFA('ID-BS-2030')">LOGAR: BEATRIZ (GERENTE)</button>
        <button class="btn-danger" onclick="closeModal()">CANCELAR</button>
    </div>

    <div id="m-geo-sim" class="modal-content" style="display:none">
        <h2>TRIANGULANDO POSIÇÃO...</h2>
        <div id="geo-steps" class="geo-fake-data"></div>
        <div class="progress-container" id="p-container">
            <div class="progress-bar" id="p-bar"></div>
        </div>
        <p id="geo-status" style="font-size: 0.7rem;">CONECTANDO AOS SATÉLITES NEXUS...</p>
    </div>

    <div id="m-token" class="modal-content" style="display:none">
        <h2>MFA: TOKEN DINÂMICO</h2>
        <p style="font-size: 0.6rem;">DIGITE O CÓDIGO ENVIADO AO SEU TERMINAL MÓVEL</p>
        <input type="text" id="token-input" maxlength="6" placeholder="000000">
        <button onclick="validateFinal()">CONFIRMAR AUTENTICAÇÃO</button>
    </div>
</div>

<div class="main-container">
    <div class="panel">
        <h2>MONITOR DE REDE</h2>
        <div id="logs" style="font-size: 0.6rem; overflow-y: auto; flex-grow: 1;"></div>
    </div>

    <div class="terminal-container">
        <div id="terminal-log">> AGUARDANDO COMANDO INICIAL...</div>
        <div class="input-area">
            <button onclick="openModal()">🔑 ENTRAR NO SISTEMA</button>
        </div>
    </div>

    <div class="panel">
        <h2>STATUS ÓPTICO</h2>
        <div id="lock-status" style="text-align:center; margin-top:20px; font-weight:bold; color:var(--error-red)">🔒 BLOQUEADO</div>
        <button id="btn-out" style="display:none; margin-top:auto" onclick="location.reload()">TERMINAR SESSÃO</button>
    </div>
</div>

<script>
    const USERS = {
        "ID-BS-2030": { nome: "BEATRIZ SOARES", nv: 2 },
        "ID-RR-3040": { nome: "RICARDO ROCHA", nv: 3 }
    };

    let currentUser = null;
    let currentToken = null;

    function writeLog(t, err = false) {
        const l = document.getElementById('terminal-log');
        l.innerHTML += `<br><span style="color:${err ? 'var(--error-red)' : 'var(--primary-green)'}">> ${t}</span>`;
        l.scrollTop = l.scrollHeight;
    }

    function openModal() {
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('m-start').style.display = 'block';
        document.getElementById('m-geo-sim').style.display = 'none';
        document.getElementById('m-token').style.display = 'none';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
    }

    async function stepMFA(id) {
        currentUser = { ...USERS[id], id: id };
        document.getElementById('m-start').style.display = 'none';
        document.getElementById('m-geo-sim').style.display = 'block';
        document.getElementById('p-container').style.display = 'block';
        
        const steps = [
            "BUSCANDO ENDEREÇO IP...",
            "LOCALIZANDO TORRES DE CELULAR...",
            "TRIANGULANDO VIA WI-FI...",
            "REQUISITANDO SATÉLITES GPS...",
            "VERIFICANDO PERÍMETRO DE SEGURANÇA..."
        ];

        const geoDisplay = document.getElementById('geo-steps');
        const bar = document.getElementById('p-bar');
        
        // Simulação visual de carregamento
        for (let i = 0; i < steps.length; i++) {
            geoDisplay.innerHTML += `+ ${steps[i]}<br>`;
            bar.style.width = ((i + 1) * 20) + "%";
            await new Promise(r => setTimeout(r, 800)); // Espera 0.8s por passo
        }

        writeLog("LOCALIZAÇÃO VERIFICADA: DENTRO DO PERÍMETRO PERMITIDO.");
        
        // Vai para a tela de Token
        document.getElementById('m-geo-sim').style.display = 'none';
        document.getElementById('m-token').style.display = 'block';
        
        currentToken = Math.floor(100000 + Math.random() * 900000).toString();
        writeLog(`[SECURITY TOKEN]: ${currentToken}`, true);
    }

    function validateFinal() {
        const val = document.getElementById('token-input').value;
        if (val === currentToken) {
            writeLog("MULTI-FACTOR AUTH: SUCESSO.");
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('lock-status').innerHTML = "🔓 ACESSO LIBERADO";
            document.getElementById('lock-status').style.color = "var(--primary-green)";
            document.getElementById('btn-out').style.display = 'block';
        } else {
            writeLog("TOKEN INVÁLIDO. TENTATIVA REGISTRADA.", true);
            alert("ERRO DE AUTENTICAÇÃO!");
            location.reload();
        }
    }
</script>
</body>
</html>
