<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Security Assistant</title>
    <style>
        :root {
            --primary-green: #00ff41;
            --dark-bg: #0a0a0a;
            --panel-bg: #111;
            --border-style: 1px solid #222;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--primary-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        .main-container {
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            gap: 10px;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        .panel {
            background: var(--panel-bg);
            border: var(--border-style);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h2 { font-size: 0.8rem; border-bottom: 1px solid #333; padding-bottom: 5px; margin: 0; }

        .terminal-container {
            border: var(--border-style);
            background: black;
            display: flex;
            flex-direction: column;
        }

        #terminal-log {
            flex-grow: 1;
            padding: 20px;
            font-size: 0.8rem;
            line-height: 1.5;
            overflow-y: auto;
        }

        .input-area {
            padding: 20px;
            border-top: var(--border-style);
            text-align: center;
            background: #050505;
        }

        button {
            background: transparent;
            color: var(--primary-green);
            border: 1px solid var(--primary-green);
            padding: 10px;
            cursor: pointer;
            width: 85%;
            margin-bottom: 10px;
            font-weight: bold;
        }

        button:hover { background: var(--primary-green); color: black; }

        /* MODAL */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #000;
            border: 1px solid var(--primary-green);
            padding: 30px;
            text-align: center;
            width: 350px;
        }

        input {
            background: #111;
            border: 1px solid var(--primary-green);
            color: var(--primary-green);
            padding: 10px;
            width: 90%;
            margin-bottom: 15px;
            text-align: center;
            outline: none;
        }

        /* CAMERA / SCANNER REAL */
        #camera-container {
            width: 100%;
            height: 150px;
            border: 1px solid #222;
            position: relative;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #webcam-view {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ajusta a imagem da câmera */
            filter: grayscale(1) contrast(1.2) brightness(0.8); /* Efeito Cyberpunk */
            transform: scaleX(-1); /* Espelha a câmera */
        }

        .scanning-line {
            width: 100%;
            height: 2px;
            background: var(--primary-green);
            position: absolute;
            top: 0;
            animation: scan 2s infinite linear;
            display: none;
            box-shadow: 0 0 10px var(--primary-green);
            z-index: 5;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body onload="setupCamera()">

<div id="modal-overlay">
    <div id="step-card" class="modal-content" style="display: none;">
        <h2>APROXIME O CARTÃO</h2>
        <button onclick="processLogin('ID-HT-1020', 'CARD')">HEITOR (NV 1)</button>
        <button onclick="processLogin('ID-BS-2030', 'CARD')">BEATRIZ (NV 2)</button>
        <button onclick="processLogin('ID-RR-3040', 'CARD')">RICARDO (NV 3)</button>
        <button onclick="closeModal()" style="border:none; color: #555;">FECHAR</button>
    </div>

    <div id="step-manual" class="modal-content" style="display: none;">
        <h2>LOGIN POR ID</h2>
        <input type="text" id="manual-id-input" placeholder="EX: ID-RR-3040">
        <button onclick="checkManualID()">INICIAR FACE SCAN</button>
        <button onclick="closeModal()" style="border:none; color: #555;">VOLTAR</button>
    </div>

    <div id="step-confirm-card" class="modal-content" style="display: none;">
        <h2>DADOS DO CARTÃO</h2>
        <div id="employee-data-card" style="text-align: left; font-size: 0.8rem; border: 1px dashed; padding: 10px; margin-bottom: 15px;"></div>
        <button onclick="executeAuth()">ENTRAR NO SISTEMA</button>
    </div>
</div>

<div class="main-container">
    <div class="panel">
        <h2>SYSTEM</h2>
        <div id="history-log" style="font-size: 0.6rem;"></div>
    </div>

    <div class="terminal-container">
        <div id="terminal-log">
            > NEXUS SECURITY OS <br>
            > CAMERA SYSTEM: <span id="camera-status">A CARREGAR...</span> <br>
            > AGUARDANDO AUTENTICAÇÃO...
        </div>
        <div class="input-area">
            <button onclick="openModal('CARD')">💳 LER CARTÃO</button>
            <button onclick="openModal('MANUAL')">⌨️ ENTRAR COM ID</button>
        </div>
    </div>

    <div class="panel">
        <h2>SECURITY SCAN</h2>
        <div id="camera-container">
            <div class="scanning-line" id="scanner-line"></div>
            <video id="webcam-view" autoplay playsinline></video>
        </div>
        <div id="lock-ui" style="color: red; text-align: center; margin-top: 10px;">🔒 LOCKED</div>
        <div id="user-display" style="font-size: 0.6rem;"></div>
    </div>
</div>

<script>
    const USERS = {
        "ID-HT-1020": { nome: "HEITOR TORRES", cargo: "PRODUÇÃO", nv: "1" },
        "ID-BS-2030": { nome: "BEATRIZ SOARES", cargo: "GERENTE", nv: "2" },
        "ID-RR-3040": { nome: "RICARDO ROCHA", cargo: "CHEFE", nv: "3" }
    };

    let currentUser = null;
    let loginMethod = '';

    // FUNÇÃO PARA LIGAR A CÂMERA
    async function setupCamera() {
        const video = document.getElementById('webcam-view');
        const status = document.getElementById('camera-status');
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            status.innerText = "ONLINE";
            status.style.color = "var(--primary-green)";
        } catch (err) {
            console.error("Erro ao aceder à câmara: ", err);
            status.innerText = "ERRO (SEM PERMISSÃO)";
            status.style.color = "red";
        }
    }

    function openModal(type) {
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('step-card').style.display = type === 'CARD' ? 'block' : 'none';
        document.getElementById('step-manual').style.display = type === 'MANUAL' ? 'block' : 'none';
        document.getElementById('step-confirm-card').style.display = 'none';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
    }

    function checkManualID() {
        const inputVal = document.getElementById('manual-id-input').value.trim().toUpperCase();
        if (USERS[inputVal]) {
            currentUser = USERS[inputVal];
            currentUser.idCod = inputVal;
            loginMethod = 'MANUAL';
            closeModal();
            startFaceScan();
        } else {
            alert("ID INVÁLIDO");
        }
    }

    function processLogin(id, method) {
        currentUser = USERS[id];
        currentUser.idCod = id;
        loginMethod = method;
        document.getElementById('step-card').style.display = 'none';
        document.getElementById('step-confirm-card').style.display = 'block';
        document.getElementById('employee-data-card').innerHTML = `NOME: ${currentUser.nome}<br>CARGO: ${currentUser.cargo}<br>NÍVEL: ${currentUser.nv}`;
    }

    function startFaceScan() {
        const log = document.getElementById('terminal-log');
        log.innerHTML += `<br>> ID VALIDADO: ${currentUser.idCod}`;
        log.innerHTML += `<br>> ANALISANDO BIOMETRIA FACIAL...`;

        document.getElementById('scanner-line').style.display = 'block';
        
        // Remove o filtro cinza durante o scan para parecer mais real
        document.getElementById('webcam-view').style.filter = "none";

        setTimeout(() => {
            document.getElementById('scanner-line').style.display = 'none';
            document.getElementById('webcam-view').style.filter = "grayscale(1) contrast(1.2) brightness(0.8)";
            finalize();
        }, 3000);
    }

    function executeAuth() {
        closeModal();
        finalize();
    }

    function finalize() {
        document.getElementById('lock-ui').innerHTML = "🔓 UNLOCKED";
        document.getElementById('lock-ui').style.color = "#00ff41";
        document.getElementById('user-display').innerHTML = `BEM-VINDO, ${currentUser.nome}<br>SISTEMA LIBERADO (NV ${currentUser.nv})`;
        document.getElementById('terminal-log').innerHTML += `<br>> ACESSO CONCEDIDO PARA ${currentUser.nome}.`;
        
        const history = document.getElementById('history-log');
        history.innerHTML = `[${new Date().toLocaleTimeString()}] ${currentUser.idCod} OK<br>` + history.innerHTML;
    }
</script>
</body>
</html>
