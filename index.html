<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Security - Geo-Verification Mode</title>
    <style>
        :root {
            --primary-green: #00ff41;
            --error-red: #ff0033;
            --dark-bg: #0a0a0a;
            --panel-bg: #111;
            --border-style: 1px solid #222;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--primary-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        .main-container {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 15px;
            width: 100%;
            max-width: 1400px;
            padding: 20px;
            box-sizing: border-box;
        }

        .panel {
            background: var(--panel-bg);
            border: var(--border-style);
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .terminal-container {
            border: var(--border-style);
            background: black;
            display: flex;
            flex-direction: column;
        }

        #terminal-log {
            flex-grow: 1;
            padding: 20px;
            font-size: 0.85rem;
            line-height: 1.4;
            overflow-y: auto;
        }

        .input-area {
            padding: 20px;
            border-top: var(--border-style);
            background: #050505;
            text-align: center;
        }

        button {
            background: transparent;
            color: var(--primary-green);
            border: 1px solid var(--primary-green);
            padding: 12px;
            cursor: pointer;
            width: 90%;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 0.75rem;
        }

        button:hover { background: var(--primary-green); color: black; }

        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #000;
            border: 2px solid var(--primary-green);
            padding: 30px;
            width: 500px;
            text-align: center;
        }

        .progress-container {
            width: 100%;
            border: 1px solid #333;
            height: 12px;
            margin: 20px 0;
            background: #050505;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--primary-green);
            box-shadow: 0 0 10px var(--primary-green);
            transition: width 0.1s;
        }

        .geo-data {
            font-size: 0.7rem;
            color: #888;
            text-align: left;
            margin-bottom: 15px;
            height: 100px;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div id="modal-overlay">
    <div id="m-select" class="modal-content" style="display:none">
        <h2>IDENTIFICAÇÃO REQUERIDA</h2>
        <button onclick="startGeoAuth('RICARDO ROCHA (NV 3)')">ENTRAR COMO RICARDO</button>
        <button onclick="startGeoAuth('BEATRIZ SOARES (NV 2)')">ENTRAR COMO BEATRIZ</button>
        <button onclick="closeModal()" style="border-color: #555; color: #555;">CANCELAR</button>
    </div>

    <div id="m-geo" class="modal-content" style="display:none">
        <h2>VERIFICANDO PERÍMETRO</h2>
        <div id="geo-list" class="geo-data"></div>
        <div class="progress-container">
            <div class="progress-bar" id="p-bar"></div>
        </div>
        <div id="geo-status" style="font-size: 0.6rem; letter-spacing: 2px;">SINCRONIZANDO...</div>
    </div>
</div>

<div class="main-container">
    <div class="panel">
        <h2>SISTEMA LOGS</h2>
        <div id="logs" style="font-size: 0.6rem; overflow-y: auto; flex-grow: 1;"></div>
    </div>

    <div class="terminal-container">
        <div id="terminal-log">> CONEXÃO ENCRIPTADA ESTABELECIDA...</div>
        <div class="input-area">
            <button onclick="openModal()">🔓 INICIAR PROTOCOLO DE ACESSO</button>
        </div>
    </div>

    <div class="panel">
        <h2>LOCK-STATUS</h2>
        <div id="lock-status" style="text-align:center; margin-top:20px; font-weight:bold; color:var(--error-red)">🔒 SECURE ACCESS ONLY</div>
        <button id="btn-out" style="display:none; margin-top:auto" onclick="location.reload()">TERMINAR SESSÃO</button>
    </div>
</div>

<script>
    let activeUser = "";

    function writeLog(t, err = false) {
        const l = document.getElementById('terminal-log');
        l.innerHTML += `<br><span style="color:${err ? 'var(--error-red)' : 'var(--primary-green)'}">> ${t}</span>`;
        l.scrollTop = l.scrollHeight;
    }

    function openModal() {
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('m-select').style.display = 'block';
        document.getElementById('m-geo').style.display = 'none';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
    }

    async function startGeoAuth(user) {
        activeUser = user;
        document.getElementById('m-select').style.display = 'none';
        document.getElementById('m-geo').style.display = 'block';

        const bar = document.getElementById('p-bar');
        const list = document.getElementById('geo-list');
        const status = document.getElementById('geo-status');

        const tasks = [
            "SOLICITANDO IP PÚBLICO...",
            "TRIANGULANDO TORRES DE CELULAR...",
            "VALIDANDO ENDEREÇO MAC...",
            "REQUISITANDO COORDENADAS SATELITAIS...",
            "VERIFICANDO CERCA GEOGRÁFICA (GEOFENCE)...",
            "ANALISANDO INTEGRIDADE DO TERMINAL..."
        ];

        for (let i = 0; i < tasks.length; i++) {
            list.innerHTML += `> ${tasks[i]} <br>`;
            bar.style.width = ((i + 1) * 16.6) + "%";
            await new Promise(r => setTimeout(r, 700));
        }

        status.innerHTML = "LOCALIZAÇÃO CONFIRMADA!";
        status.style.color = "var(--primary-green)";
        
        await new Promise(r => setTimeout(r, 1000));
        finishAccess();
    }

    function finishAccess() {
        document.getElementById('modal-overlay').style.display = 'none';
        document.getElementById('lock-status').innerHTML = "🔓 ACESSO CONCEDIDO";
        document.getElementById('lock-status').style.color = "var(--primary-green)";
        document.getElementById('btn-out').style.display = 'block';
        
        writeLog(`USUÁRIO AUTENTICADO: ${activeUser}`);
        writeLog("VERIFICAÇÃO GEOGRÁFICA: DENTRO DO PERÍMETRO.");
    }
</script>
</body>
</html>
