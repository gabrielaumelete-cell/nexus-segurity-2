<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Security OS - Final Version</title>
    <style>
        :root {
            --primary-green: #00ff41;
            --error-red: #ff0033;
            --dark-bg: #0a0a0a;
            --panel-bg: #111;
            --border-style: 1px solid #222;
            --nv1: #00ff41;
            --nv2: #ffcc00;
            --nv3: #ff3300;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--primary-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        .main-container {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 15px;
            width: 100%;
            max-width: 1400px;
            padding: 20px;
            box-sizing: border-box;
        }

        .panel {
            background: var(--panel-bg);
            border: var(--border-style);
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .terminal-container {
            border: var(--border-style);
            background: black;
            display: flex;
            flex-direction: column;
        }

        #terminal-log {
            flex-grow: 1;
            padding: 20px;
            font-size: 0.85rem;
            line-height: 1.4;
            overflow-y: auto;
        }

        .input-area {
            padding: 20px;
            border-top: var(--border-style);
            background: #050505;
            text-align: center;
            display: flex;
            gap: 10px;
        }

        button {
            background: transparent;
            color: var(--primary-green);
            border: 1px solid var(--primary-green);
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.7rem;
            flex: 1;
        }

        button:hover:not(:disabled) { background: var(--primary-green); color: black; }

        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #000;
            border: 2px solid var(--primary-green);
            padding: 30px;
            max-width: 900px;
            text-align: center;
        }

        .badge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 25px 0; }
        
        .badge-card {
            border: 1px solid #222;
            background: #0a0a0a;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .badge-nv-1 { border-top: 4px solid var(--nv1); }
        .badge-nv-2 { border-top: 4px solid var(--nv2); }
        .badge-nv-3 { border-top: 4px solid var(--nv3); }

        .photo-box {
            width: 110px; height: 110px;
            background: #1a1a1a;
            border: 1px solid #333;
            margin-bottom: 10px;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .photo-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .badge-name { font-weight: bold; font-size: 0.65rem; }
        /* IDs restaurados visualmente */
        .badge-id { font-size: 0.55rem; color: #00ff41; background: rgba(0,255,65,0.1); padding: 2px 5px; margin-top: 5px; }

        input {
            background: #000;
            border: 1px solid var(--primary-green);
            color: var(--primary-green);
            padding: 12px;
            width: 80%;
            margin-bottom: 15px;
            text-align: center;
            font-family: inherit;
        }

        #camera-box { width: 100%; height: 220px; background: #000; border: 1px solid #222; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: none; }
        #face-choice-ui { display: none; margin-top: 15px; gap: 10px; }
        #admin-panel { display: none; border-top: 1px solid #333; padding-top: 15px; margin-top: auto; }
        
        #lock-status { text-align:center; margin-top:20px; font-weight:bold; color:var(--error-red); letter-spacing: 2px; }
    </style>
</head>
<body onload="initSystem()">

<div id="modal-overlay">
    <div id="m-id" class="modal-content" style="display:none">
        <h2>IDENTIFICAÇÃO MANUAL</h2>
        <input type="text" id="id-input" placeholder="DIGITE O ID (EX: ID-RR-3040)" autocomplete="off">
        <button onclick="loginID()" style="width:85%">VERIFICAR</button>
        <button onclick="closeModal()" style="width:85%; margin-top:10px; border-color:#444; color:#444;">VOLTAR</button>
    </div>

    <div id="m-card-select" class="modal-content" style="display:none">
        <h2>SELECIONE A IDENTIDADE</h2>
        <div class="badge-grid" id="login-badge-list"></div>
        <button onclick="closeModal()">CANCELAR</button>
    </div>

    <div id="m-db-view" class="modal-content" style="display:none; max-width: 1000px;">
        <h2>REGISTRO DE IDENTIDADES</h2>
        <div class="badge-grid" id="db-badge-list"></div>
        <div id="cap-ui" style="display:none; border:1px solid gold; padding:15px; margin-top:10px;">
            <video id="v-db" autoplay playsinline style="width:200px; border:1px solid gold;"></video><br>
            <button onclick="savePhoto()" style="color:gold; border-color:gold; margin-top:10px;">CONFIRMAR BIOMETRIA</button>
        </div>
        <button onclick="closeModal()" style="margin-top:20px">FECHAR</button>
    </div>

    <div id="m-db-auth" class="modal-content" style="display:none">
        <h2>ACESSO RESTRITO</h2>
        <input type="password" id="db-pass" placeholder="PASSWORD" autocomplete="new-password">
        <button onclick="verifyDB()" style="width:85%">ENTRAR</button>
        <button onclick="closeModal()" style="width:85%; margin-top:10px;">SAIR</button>
    </div>

    <div id="m-geo" class="modal-content" style="display:none">
        <h2>SINCRO. SATÉLITE...</h2>
        <div id="geo-steps" style="font-size: 0.6rem; color: gold; text-align: left; height: 50px;"></div>
        <div style="width: 100%; border: 1px solid #333; height: 4px;"><div id="p-bar" style="width: 0%; height: 100%; background: var(--primary-green); transition: width 0.1s;"></div></div>
    </div>
</div>

<div class="main-container">
    <div class="panel">
        <h2>LOGS DA SESSÃO</h2>
        <div id="logs" style="font-size: 0.5rem; overflow-y: auto; flex-grow: 1;"></div>
        <div id="admin-panel">
            <h2 style="color:gold">SISTEMA OVERRIDE</h2>
            <div id="admin-btns"></div>
        </div>
    </div>

    <div class="terminal-container">
        <div id="terminal-log">> AGUARDANDO COMANDO...</div>
        <div class="input-area">
            <button onclick="renderLoginBadges()">💳 CRACHÁ</button>
            <button onclick="openModal('ID')">⌨️ MANUAL</button>
            <button onclick="openModal('DB')">🗄️ DATABASE</button>
        </div>
    </div>

    <div class="panel">
        <h2>BIO SCANNER</h2>
        <div id="camera-box">
            <video id="webcam" autoplay playsinline></video>
            <div id="cam-txt">[ STANDBY ]</div>
        </div>
        <div id="face-choice-ui">
            <button onclick="finishLogin()" style="color:var(--primary-green); border-color:var(--primary-green); flex:1">CONFIRMAR</button>
            <button onclick="failFaceID()" style="color:var(--error-red); border-color:var(--error-red); flex:1">REJEITAR</button>
        </div>
        <div id="lock-status">🔒 LOCKED</div>
        <button id="btn-panic" style="display:none; margin-top:20px; border-color:#ff9900; color:#ff9900;" onclick="logout()">🕶️ REMOVER ÓCULOS</button>
        <button id="btn-out" style="display:none; margin-top:auto" onclick="logout()">LOGOUT & WIPE</button>
    </div>
</div>

<canvas id="canvas" width="400" height="300" style="display:none"></canvas>

<script>
    const USERS = {
        "ID-HT-1020": { nome: "HEITOR TORRES", key: "ht", nv: 1, cargo: "OPERADOR" },
        "ID-BS-2030": { nome: "BEATRIZ SOARES", key: "bs", nv: 2, cargo: "SUPERVISORA" },
        "ID-RR-3040": { nome: "RICARDO ROCHA", key: "rr", nv: 3, cargo: "DIRETOR" }
    };

    let currentUser = null;
    let stream = null;
    let capId = null;
    let idleTimer;
    let cardRegistry = JSON.parse(localStorage.getItem('nexus_cards')) || {"ID-HT-1020": true, "ID-BS-2030": true, "ID-RR-3040": true};

    function initSystem() {
        clearInputs();
        resetIdleTimer();
        window.onmousemove = resetIdleTimer;
        window.onkeydown = resetIdleTimer;
        window.onclick = resetIdleTimer;
    }

    // LOGOUT AUTOMATICO POR INATIVIDADE (2 MINUTOS)
    function resetIdleTimer() {
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => {
            if (currentUser) {
                logout();
            }
        }, 120000); 
    }

    function clearInputs() { document.querySelectorAll('input').forEach(i => i.value = ""); }

    function openModal(m) {
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('m-db-auth').style.display = (m === 'DB') ? 'block' : 'none';
        document.getElementById('m-id').style.display = (m === 'ID') ? 'block' : 'none';
        document.getElementById('m-card-select').style.display = (m === 'CARD') ? 'block' : 'none';
        document.getElementById('m-db-view').style.display = 'none';
        document.getElementById('m-geo').style.display = 'none';
    }

    function closeModal() { 
        if(stream) stream.getTracks().forEach(t => t.stop());
        document.getElementById('cap-ui').style.display = 'none';
        clearInputs(); 
        document.getElementById('modal-overlay').style.display = 'none'; 
    }

    function renderLoginBadges() {
        openModal('CARD');
        const list = document.getElementById('login-badge-list');
        list.innerHTML = '';
        Object.keys(USERS).forEach(id => {
            const user = USERS[id];
            const img = localStorage.getItem('photo-' + user.key);
            const active = cardRegistry[id];
            list.innerHTML += `
                <div class="badge-card badge-nv-${user.nv}" onclick="${active ? `loginProcess('${id}')` : ''}" style="${!active ? 'opacity: 0.2; cursor: not-allowed;' : ''}">
                    <div class="photo-box">
                        ${img ? `<img src="${img}">` : '<span style="font-size:0.4rem;">SEM FOTO</span>'}
                    </div>
                    <div class="badge-name">${user.nome}</div>
                    <div class="badge-id">${id}</div>
                </div>
            `;
        });
    }

    function renderDBBadges() {
        const list = document.getElementById('db-badge-list');
        list.innerHTML = '';
        Object.keys(USERS).forEach(id => {
            const user = USERS[id];
            const img = localStorage.getItem('photo-' + user.key);
            list.innerHTML += `
                <div class="badge-card badge-nv-${user.nv}">
                    <div class="photo-box">
                        ${img ? `<img src="${img}">` : '<span style="font-size:0.4rem;">NO SCAN</span>'}
                    </div>
                    <div class="badge-name">${user.nome}</div>
                    <div class="badge-id">${id}</div>
                    <button onclick="openCap('${id}')" style="margin-top:10px; width:100%; border-color:gold; color:gold">SCAN FACE</button>
                </div>
            `;
        });
    }

    function verifyDB() {
        if (document.getElementById('db-pass').value === "senha1234") {
            document.getElementById('m-db-auth').style.display = 'none';
            document.getElementById('m-db-view').style.display = 'block';
            renderDBBadges();
        } else { closeModal(); }
    }

    function loginID() {
        const val = document.getElementById('id-input').value.toUpperCase().trim();
        if (USERS[val]) {
            if (cardRegistry[val]) loginProcess(val);
            else alert("ID BLOQUEADO");
        } else alert("ID INVÁLIDO");
        clearInputs();
    }

    async function loginProcess(id) {
        currentUser = { ...USERS[id], id: id };
        document.getElementById('m-card-select').style.display = 'none';
        document.getElementById('m-id').style.display = 'none';
        document.getElementById('m-geo').style.display = 'block';
        document.getElementById('geo-steps').innerHTML = "";
        const steps = ["CONNECTING...", "GPS SYNC...", "AUTHORIZED"];
        for (let i = 0; i < steps.length; i++) {
            document.getElementById('geo-steps').innerHTML += `> ${steps[i]}<br>`;
            document.getElementById('p-bar').style.width = ((i + 1) * 33) + "%";
            await new Promise(r => setTimeout(r, 600));
        }
        closeModal();
        startFaceID();
    }

    async function startFaceID() {
        const v = document.getElementById('webcam');
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: true });
            v.srcObject = stream; v.style.display = 'block';
            document.getElementById('cam-txt').style.display = 'none';
            document.getElementById('face-choice-ui').style.display = 'flex';
        } catch(e) { console.log("Câmera não disponível."); }
    }

    function finishLogin() {
        document.getElementById('face-choice-ui').style.display = 'none';
        document.getElementById('lock-status').innerHTML = "🔓 UNLOCKED";
        document.getElementById('lock-status').style.color = "var(--primary-green)";
        document.getElementById('btn-out').style.display = 'block';
        document.getElementById('btn-panic').style.display = 'block';
        if (currentUser.nv >= 2) { document.getElementById('admin-panel').style.display = 'block'; updateAdmin(); }
        addLog(`${currentUser.nome} ENTROU.`);
    }

    function updateAdmin() {
        const c = document.getElementById('admin-btns'); c.innerHTML = '';
        Object.keys(cardRegistry).forEach(id => {
            const active = cardRegistry[id];
            const canEdit = currentUser.nv >= USERS[id].nv;
            c.innerHTML += `<div style="margin-bottom:8px; display:flex; justify-content:space-between;">
                <span style="font-size:0.5rem">${USERS[id].nome}</span>
                <button onclick="toggleStatus('${id}')" ${!canEdit ? 'disabled' : ''} style="width:50px; padding:2px; ${active?'':'border-color:red; color:red'}">${active?'ON':'OFF'}</button>
            </div>`;
        });
    }

    async function openCap(id) {
        capId = id; document.getElementById('cap-ui').style.display = 'block';
        const v = document.getElementById('v-db');
        const s = await navigator.mediaDevices.getUserMedia({ video: true });
        v.srcObject = s;
        stream = s;
    }

    function savePhoto() {
        const v = document.getElementById('v-db');
        const c = document.getElementById('canvas');
        const ctx = c.getContext('2d');
        ctx.translate(400, 0); ctx.scale(-1, 1);
        ctx.drawImage(v, 0, 0, 400, 300);
        localStorage.setItem('photo-' + USERS[capId].key, c.toDataURL('image/png'));
        renderDBBadges();
        if(stream) stream.getTracks().forEach(t => t.stop());
        document.getElementById('cap-ui').style.display = 'none';
    }

    function toggleStatus(id) { cardRegistry[id] = !cardRegistry[id]; localStorage.setItem('nexus_cards', JSON.stringify(cardRegistry)); updateAdmin(); }
    function addLog(m) { let h = JSON.parse(localStorage.getItem('nexus_h')) || []; h.unshift(`[${new Date().toLocaleTimeString()}] ${m}`); localStorage.setItem('nexus_h', JSON.stringify(h.slice(0,20))); loadLogs(); }
    function loadLogs() { document.getElementById('logs').innerHTML = (JSON.parse(localStorage.getItem('nexus_h')) || []).join('<br>'); }
    function failFaceID() { logout(); }
    function logout() { 
        if(stream) stream.getTracks().forEach(t => t.stop());
        localStorage.removeItem('nexus_h');
        location.reload(); 
    }
</script>
</body>
</html>
