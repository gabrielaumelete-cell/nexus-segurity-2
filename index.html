<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Security Assistant</title>
    <style>
        :root {
            --primary-green: #00ff41;
            --error-red: #ff0033;
            --dark-bg: #0a0a0a;
            --panel-bg: #111;
            --border-style: 1px solid #222;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--primary-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        .main-container {
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            gap: 10px;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        .panel {
            background: var(--panel-bg);
            border: var(--border-style);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h2 { font-size: 0.8rem; border-bottom: 1px solid #333; padding-bottom: 5px; margin: 0; }

        .terminal-container {
            border: var(--border-style);
            background: black;
            display: flex;
            flex-direction: column;
        }

        #terminal-log {
            flex-grow: 1;
            padding: 20px;
            font-size: 0.8rem;
            line-height: 1.5;
            overflow-y: auto;
        }

        .input-area {
            padding: 20px;
            border-top: var(--border-style);
            text-align: center;
            background: #050505;
        }

        button {
            background: transparent;
            color: var(--primary-green);
            border: 1px solid var(--primary-green);
            padding: 10px;
            cursor: pointer;
            width: 85%;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.7rem;
            transition: 0.1s;
        }

        button:hover { background: var(--primary-green); color: black; }
        .btn-error { border-color: var(--error-red); color: var(--error-red); }
        .btn-error:hover { background: var(--error-red); color: white; }

        /* MODAL */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #000;
            border: 1px solid var(--primary-green);
            padding: 30px;
            text-align: center;
            width: 350px;
        }

        input {
            background: #111;
            border: 1px solid var(--primary-green);
            color: var(--primary-green);
            padding: 10px;
            width: 90%;
            margin-bottom: 15px;
            text-align: center;
            outline: none;
        }

        /* CAMERA */
        #camera-container {
            width: 100%; height: 150px;
            border: 1px solid #222;
            position: relative;
            background: #000;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        #webcam-view {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: grayscale(1) brightness(0.7);
            transform: scaleX(-1);
            display: none;
        }

        .scanning-line {
            width: 100%; height: 2px;
            background: var(--primary-green);
            position: absolute; top: 0;
            animation: scan 2s infinite linear;
            display: none;
            box-shadow: 0 0 10px var(--primary-green);
            z-index: 5;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        #sim-controls { display: none; margin-top: 10px; justify-content: space-between; }
        
        .data-sheet {
            text-align: left;
            font-size: 0.75rem;
            border: 1px dashed var(--primary-green);
            padding: 10px;
            margin-bottom: 15px;
        }

        /* ADMIN PANEL */
        #admin-panel { display: none; margin-top: 10px; border-top: 1px solid #333; padding-top: 10px; }
        .admin-btn { font-size: 0.6rem; padding: 5px; width: 100%; margin-bottom: 5px; border-color: #555; color: #555; }
        .active-card { color: var(--primary-green); border-color: var(--primary-green); }
        .disabled-card { color: var(--error-red); border-color: var(--error-red); }
    </style>
</head>
<body>

<div id="modal-overlay">
    <div id="step-card" class="modal-content">
        <h2>LEITURA DE CARTÃO</h2>
        <button onclick="processLogin('ID-HT-1020', 'CARD')">HEITOR (NV 1)</button>
        <button onclick="processLogin('ID-BS-2030', 'CARD')">BEATRIZ (NV 2)</button>
        <button onclick="processLogin('ID-RR-3040', 'CARD')">RICARDO (NV 3)</button>
        <button onclick="closeModal()" style="border:none; color: #555;">FECHAR</button>
    </div>

    <div id="step-manual" class="modal-content">
        <h2>ACESSO VIA ID</h2>
        <input type="text" id="manual-id-input" placeholder="DIGITE O ID">
        <button onclick="checkManualID()">VALIDAR CREDENCIAIS</button>
        <button onclick="closeModal()" style="border:none; color: #555;">VOLTAR</button>
    </div>

    <div id="step-confirm" class="modal-content">
        <h2 id="confirm-type-title">VERIFICAÇÃO</h2>
        <div id="employee-data-display" class="data-sheet"></div>
        <button id="final-btn" onclick="executeAuth()">ENTRAR NO SISTEMA</button>
        <button id="scan-init-btn" onclick="triggerFaceScanUI()">INICIAR FACE SCAN</button>
    </div>
</div>

<div class="main-container">
    <div class="panel">
        <h2>SYSTEM HISTORY</h2>
        <div id="history-log" style="font-size: 0.55rem; overflow-y: auto; max-height: 200px;"></div>
        
        <div id="admin-panel">
            <h2 style="font-size: 0.6rem; color: #555; margin-bottom: 10px;">GESTÃO DE CARTÕES</h2>
            <button id="adm-ht" class="admin-btn" onclick="toggleCard('ID-HT-1020')">HT-1020: ATIVO</button>
            <button id="adm-bs" class="admin-btn" onclick="toggleCard('ID-BS-2030')">BS-2030: ATIVO</button>
            <button id="adm-rr" class="admin-btn" onclick="toggleCard('ID-RR-3040')">RR-3040: ATIVO</button>
        </div>
    </div>

    <div class="terminal-container">
        <div id="terminal-log">
            > NEXUS SECURITY OS <br>
            > AGUARDANDO AUTENTICAÇÃO...
        </div>
        <div class="input-area" id="main-controls">
            <button onclick="openModal('CARD')">💳 LER CARTÃO</button>
            <button onclick="openModal('MANUAL')">⌨️ ENTRAR COM ID</button>
        </div>
    </div>

    <div class="panel">
        <h2>SECURITY SCAN</h2>
        <div id="camera-container">
            <div class="scanning-line" id="scanner-line"></div>
            <video id="webcam-view" autoplay playsinline></video>
            <div id="cam-placeholder" style="color:#222; font-size: 0.6rem;">[ SENSOR OFF ]</div>
        </div>
        
        <div id="sim-controls">
            <button onclick="simulateResult(true)" style="font-size: 0.5rem; width: 48%;">FACE OK</button>
            <button onclick="simulateResult(false)" class="btn-error" style="font-size: 0.5rem; width: 48%;">ERRO</button>
        </div>

        <div id="lock-ui" style="color: red; text-align: center; margin-top: 10px;">🔒 LOCKED</div>
        <div id="user-display" style="font-size: 0.6rem; line-height: 1.4;"></div>
        
        <button id="btn-logoff" onclick="logout()" style="display:none; margin-top: auto; border-color: #555; color: #555; font-size: 0.6rem;">ENCERRAR SESSÃO</button>
    </div>
</div>

<script>
    const USERS = {
        "ID-HT-1020": { nome: "HEITOR TORRES", cargo: "PRODUÇÃO", nv: 1, id: "ID-HT-1020" },
        "ID-BS-2030": { nome: "BEATRIZ SOARES", cargo: "GERENTE", nv: 2, id: "ID-BS-2030" },
        "ID-RR-3040": { nome: "RICARDO ROCHA", cargo: "CHEFE", nv: 3, id: "ID-RR-3040" }
    };

    let CARD_STATUS = {
        "ID-HT-1020": true,
        "ID-BS-2030": true,
        "ID-RR-3040": true
    };

    let currentUser = null;
    let camStream = null;
    let idleTimer;

    function writeLog(msg, isError = false) {
        const log = document.getElementById('terminal-log');
        const color = isError ? 'var(--error-red)' : 'var(--primary-green)';
        log.innerHTML += `<br><span style="color:${color}">> ${msg}</span>`;
        log.scrollTop = log.scrollHeight;
    }

    async function startCamera() {
        const video = document.getElementById('webcam-view');
        const placeholder = document.getElementById('cam-placeholder');
        if (camStream) return;
        try {
            camStream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = camStream;
            video.style.display = 'block';
            placeholder.style.display = 'none';
        } catch (err) { writeLog("ERRO DE HARDWARE: CÂMERA NÃO DETECTADA", true); }
    }

    function stopCamera() {
        const video = document.getElementById('webcam-view');
        const placeholder = document.getElementById('cam-placeholder');
        if (camStream) {
            camStream.getTracks().forEach(track => track.stop());
            camStream = null;
        }
        video.style.display = 'none';
        placeholder.style.display = 'block';
    }

    function openModal(type) {
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('step-card').style.display = type === 'CARD' ? 'block' : 'none';
        document.getElementById('step-manual').style.display = type === 'MANUAL' ? 'block' : 'none';
        document.getElementById('step-confirm').style.display = 'none';
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    function toggleCard(id) {
        if (currentUser.nv === 2 && id === "ID-RR-3040") {
            writeLog("ERRO DE PERMISSÃO: NÍVEL INSUFICIENTE PARA ALTERAR CHEFIA", true);
            return;
        }
        CARD_STATUS[id] = !CARD_STATUS[id];
        updateAdminPanel();
        writeLog(`SISTEMA: CARTÃO ${id} ${CARD_STATUS[id] ? 'REATIVADO' : 'BLOQUEADO'}`);
    }

    function updateAdminPanel() {
        if (!currentUser || currentUser.nv < 2) return;
        ['ID-HT-1020', 'ID-BS-2030', 'ID-RR-3040'].forEach(id => {
            const shortId = id.split('-')[1].toLowerCase();
            const btn = document.getElementById(`adm-${shortId}`);
            btn.innerText = `${id.split('-')[1]}-${id.split('-')[2]}: ${CARD_STATUS[id] ? 'ATIVO' : 'DESL.'}`;
            btn.className = `admin-btn ${CARD_STATUS[id] ? 'active-card' : 'disabled-card'}`;
        });
    }

    function processLogin(id, method) {
        if (method === 'CARD' && !CARD_STATUS[id]) {
            writeLog(`ALERTA: CARTÃO ${id} REJEITADO PELO FIREWALL!`, true);
            closeModal();
            return;
        }
        showConfirmation(id, method);
    }

    function checkManualID() {
        const val = document.getElementById('manual-id-input').value.trim().toUpperCase();
        if (USERS[val]) { 
            showConfirmation(val, 'MANUAL'); 
        } else { 
            writeLog(`ERRO: ID ${val} NÃO LOCALIZADO NO BANCO DE DADOS`, true);
        }
    }

    function showConfirmation(id, method) {
        currentUser = USERS[id];
        document.getElementById('step-card').style.display = 'none';
        document.getElementById('step-manual').style.display = 'none';
        document.getElementById('step-confirm').style.display = 'block';
        
        document.getElementById('employee-data-display').innerHTML = `
            NOME: ${currentUser.nome}<br>
            CARGO: ${currentUser.cargo}<br>
            ID: ${currentUser.id}<br>
            NÍVEL: ${currentUser.nv}
        `;

        document.getElementById('final-btn').style.display = method === 'CARD' ? 'inline-block' : 'none';
        document.getElementById('scan-init-btn').style.display = method === 'MANUAL' ? 'inline-block' : 'none';
    }

    function triggerFaceScanUI() {
        closeModal();
        startCamera();
        writeLog("INICIANDO SCAN BIOMÉTRICO...");
        document.getElementById('scanner-line').style.display = 'block';
        document.getElementById('sim-controls').style.display = 'flex';
        document.getElementById('webcam-view').style.filter = "none";
    }

    function simulateResult(isCorrect) {
        document.getElementById('scanner-line').style.display = 'none';
        document.getElementById('sim-controls').style.display = 'none';
        document.getElementById('webcam-view').style.filter = "grayscale(1) brightness(0.7)";
        if (isCorrect) { finalize(); } 
        else {
            writeLog("CRITICAL ERROR: BIOMETRIA FACIAL NÃO CORRESPONDE!", true);
            stopCamera();
            document.getElementById('lock-ui').innerText = "❌ DENIED";
            setTimeout(() => { document.getElementById('lock-ui').innerText = "🔒 LOCKED"; }, 2000);
        }
    }

    function executeAuth() { closeModal(); startCamera(); finalize(); }

    function finalize() {
        document.getElementById('lock-ui').innerHTML = "🔓 UNLOCKED";
        document.getElementById('lock-ui').style.color = "var(--primary-green)";
        document.getElementById('user-display').innerHTML = `USUÁRIO: ${currentUser.nome}<br>ACESSO NÍVEL ${currentUser.nv}`;
        document.getElementById('btn-logoff').style.display = 'block';
        if (currentUser.nv >= 2) {
            document.getElementById('admin-panel').style.display = 'block';
            updateAdminPanel();
        }
        writeLog(`ACESSO CONCEDIDO: BEM-VINDO ${currentUser.nome}`);
        const history = document.getElementById('history-log');
        history.innerHTML = `[${new Date().toLocaleTimeString()}] ${currentUser.id} IN<br>` + history.innerHTML;
        resetIdleTimer();
    }

    function logout() {
        if(!currentUser) return;
        writeLog("SESSÃO ENCERRADA PELO USUÁRIO.");
        stopCamera();
        document.getElementById('admin-panel').style.display = 'none';
        document.getElementById('lock-ui').innerHTML = "🔒 LOCKED";
        document.getElementById('lock-ui').style.color = "red";
        document.getElementById('user-display').innerHTML = "";
        document.getElementById('btn-logoff').style.display = 'none';
        currentUser = null;
        clearTimeout(idleTimer);
    }

    function resetIdleTimer() {
        clearTimeout(idleTimer);
        if (currentUser) idleTimer = setTimeout(() => { writeLog("LOGOFF AUTOMÁTICO: INATIVIDADE DETECTADA", true); logout(); }, 120000);
    }
    window.onmousemove = resetIdleTimer;
    window.onkeydown = resetIdleTimer;
</script>
</body>
</html>
