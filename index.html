            

    <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Security Assistant</title>
    <style>
        :root {
            --primary-green: #00ff41;
            --dark-bg: #0a0a0a;
            --panel-bg: #111;
            --border-style: 1px solid #222;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--primary-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        .main-container {
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            gap: 10px;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        .panel {
            background: var(--panel-bg);
            border: var(--border-style);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h2 { font-size: 0.9rem; border-bottom: 1px solid #333; padding-bottom: 5px; margin: 0; }

        .terminal-container {
            border: var(--border-style);
            background: black;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #terminal-log {
            flex-grow: 1;
            padding: 20px;
            font-size: 0.85rem;
            line-height: 1.4;
            overflow-y: auto;
        }

        .input-area {
            padding: 20px;
            border-top: var(--border-style);
            text-align: center;
        }

        button {
            background: var(--primary-green);
            color: black;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: bold;
            width: 85%;
            margin-top: 5px;
        }

        /* --- MODAL DE CARTÕES --- */
        #modal-cartoes {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .card-selection {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .card-item {
            border: 2px solid var(--primary-green);
            padding: 20px;
            width: 150px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: #111;
        }

        .card-item:hover {
            background: var(--primary-green);
            color: black;
            transform: translateY(-5px);
        }

        .card-item i { display: block; font-size: 2rem; margin-bottom: 10px; }

        /* --- RESTO DOS ESTILOS --- */
        #face-scanner {
            width: 100%; height: 150px; border: 1px solid #333;
            display: flex; align-items: center; justify-content: center;
            position: relative; background: #050505;
        }

        .scanning-line {
            width: 100%; height: 2px; background: var(--primary-green);
            position: absolute; top: 0; animation: scan 2s infinite linear;
            box-shadow: 0 0 15px var(--primary-green); display: none;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="modal-cartoes">
    <h2>SELECIONE O CARTÃO DE ACESSO</h2>
    <div class="card-selection">
        <div class="card-item" onclick="selectCard('ID-HT-1020')">
            <div>NV 1</div>
            <strong>HEITOR</strong>
            <div style="font-size: 0.6rem;">PRODUÇÃO</div>
        </div>
        <div class="card-item" onclick="selectCard('ID-BS-2030')">
            <div>NV 2</div>
            <strong>BEATRIZ</strong>
            <div style="font-size: 0.6rem;">GERENTE</div>
        </div>
        <div class="card-item" onclick="selectCard('ID-RR-3040')">
            <div>NV 3</div>
            <strong>RICARDO</strong>
            <div style="font-size: 0.6rem;">CHEFE</div>
        </div>
    </div>
    <button onclick="closeModal()" style="width: auto; margin-top: 30px; background: #444; color: white;">CANCELAR</button>
</div>

<div class="main-container">
    <div class="panel">
        <div>
            <h2>SYSTEM STATUS</h2>
            <div style="font-size: 0.7rem;">MODO: <span style="color:var(--primary-green)">ONLINE</span></div>
        </div>
        <div>
            <h2>ACCESS LOGS</h2>
            <div id="access-history" style="font-size: 0.65rem;"></div>
        </div>
    </div>

    <div class="terminal-container">
        <div id="terminal-log">
            > TERMINAL // STAGE 01 <br>
            > BIOS_STATUS: OK <br>
            > WAITING_FOR_INPUT...
        </div>
        <div class="input-area">
            <button onclick="openModal()">💳 LER CARTÃO</button>
            <div style="font-size: 0.6rem; margin-top: 10px; color: #444;">UNIFIED SECURITY INTERFACE</div>
        </div>
    </div>

    <div class="panel">
        <div>
            <h2>RECONHECIMENTO</h2>
            <div id="face-scanner">
                <div class="scanning-line" id="scanner-line"></div>
                <span id="scan-text" style="font-size: 0.6rem;">AGUARDANDO...</span>
            </div>
        </div>
        <div>
            <h2>SECURITY STATUS</h2>
            <div id="lock-status" style="color: red;">🔒 LOCKED</div>
            <div id="user-info" style="font-size: 0.7rem; margin-top: 10px;"></div>
        </div>
    </div>
</div>

<script>
    const USERS = {
        "ID-HT-1020": { nome: "Heitor Torres", cargo: "PRODUÇÃO", nv: 1 },
        "ID-BS-2030": { nome: "Beatriz Soares", cargo: "GERENTE", nv: 2 },
        "ID-RR-3040": { nome: "Ricardo Rocha", cargo: "CHEFE", nv: 3 }
    };

    function openModal() { document.getElementById('modal-cartoes').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal-cartoes').style.display = 'none'; }

    function selectCard(id) {
        closeModal();
        startAuth(USERS[id]);
    }

    function addLog(text) {
        const log = document.getElementById('terminal-log');
        log.innerHTML += `<br>> ${text}`;
        log.scrollTop = log.scrollHeight;
    }

    function startAuth(user) {
        addLog(`CARTÃO LIDO: ${user.nome}`);
        addLog("INICIANDO SCANNER FACIAL...");
        
        document.getElementById('scanner-line').style.display = "block";
        document.getElementById('scan-text').innerText = "ESCANEANDO...";
        document.getElementById('scan-text').classList.add("blink");

        setTimeout(() => {
            completeAuth(user);
        }, 2500);
    }

    function completeAuth(user) {
        document.getElementById('scanner-line').style.display = "none";
        document.getElementById('scan-text').innerText = "MATCH 100%";
        document.getElementById('scan-text').classList.remove("blink");
        
        document.getElementById('lock-status').innerHTML = "🔓 UNLOCKED";
        document.getElementById('lock-status').style.color = "var(--primary-green)";
        
        document.getElementById('user-info').innerHTML = `USUÁRIO: ${user.nome}<br>CARGO: ${user.cargo}<br>NÍVEL: ${user.nv}`;
        
        addLog(`ACESSO CONCEDIDO: NÍVEL ${user.nv}`);
        addLog(`BEM-VINDO, ${user.nome.split(' ')[0]}.`);

        const history = document.getElementById('access-history');
        history.innerHTML = `[${new Date().toLocaleTimeString()}] ${user.nome} IN<br>` + history.innerHTML;
    }
</script>
</body>
</html>
