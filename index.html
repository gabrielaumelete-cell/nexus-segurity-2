<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Security OS - V3.0 Final</title>
    <style>
        :root {
            --primary-green: #00ff41;
            --error-red: #ff0033;
            --dark-bg: #0a0a0a;
            --panel-bg: #111;
            --border-style: 1px solid #222;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--primary-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        .main-container {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 15px;
            width: 100%;
            max-width: 1400px;
            padding: 20px;
            box-sizing: border-box;
        }

        .panel {
            background: var(--panel-bg);
            border: var(--border-style);
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .terminal-container {
            border: var(--border-style);
            background: black;
            display: flex;
            flex-direction: column;
        }

        #terminal-log {
            flex-grow: 1;
            padding: 20px;
            font-size: 0.85rem;
            line-height: 1.4;
            overflow-y: auto;
        }

        .input-area {
            padding: 20px;
            border-top: var(--border-style);
            background: #050505;
            text-align: center;
        }

        button {
            background: transparent;
            color: var(--primary-green);
            border: 1px solid var(--primary-green);
            padding: 12px;
            cursor: pointer;
            width: 90%;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 0.75rem;
        }

        button:hover:not(:disabled) { background: var(--primary-green); color: black; }
        button:disabled { border-color: #444; color: #444; cursor: not-allowed; }
        .btn-danger { border-color: var(--error-red); color: var(--error-red); }
        .btn-danger:hover { background: var(--error-red); color: white; }

        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #000;
            border: 2px solid var(--primary-green);
            padding: 30px;
            width: 500px;
            text-align: center;
        }

        input {
            background: #0a0a0a;
            border: 1px solid var(--primary-green);
            color: var(--primary-green);
            padding: 12px;
            width: 80%;
            margin-bottom: 20px;
            text-align: center;
        }

        .db-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .db-item { border: 1px solid #333; padding: 10px; background: #080808; font-size: 0.6rem; }
        .captured-photo { width: 100%; height: 70px; object-fit: cover; border: 1px solid var(--primary-green); }

        #camera-box {
            width: 100%; height: 200px;
            background: #000; border: 1px solid #222;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: none; }
        #admin-panel { display: none; border-top: 2px solid #333; padding-top: 15px; margin-top: auto; }
        
        #face-choice-ui { display: none; margin-top: 10px; }
        .panic-btn { margin-top: 20px; border-color: #ff9900; color: #ff9900; }
    </style>
</head>
<body>

<div id="modal-overlay">
    <div id="m-db-auth" class="modal-content" style="display:none">
        <h2>DATABASE ACCESS</h2>
        <input type="password" id="db-pass" placeholder="SENHA">
        <button onclick="verifyDB()">ENTRAR</button>
        <button onclick="closeModal()">SAIR</button>
    </div>

    <div id="m-db-view" class="modal-content" style="display:none">
        <h2>REGISTROS BIOMÉTRICOS</h2>
        <div class="db-grid" id="db-list"></div>
        <div id="cap-ui" style="display:none">
            <video id="v-db" autoplay playsinline style="width:200px; height:150px; border:1px solid gold;"></video><br>
            <button onclick="savePhoto()" style="color:gold; border-color:gold">CAPTURAR</button>
        </div>
        <button onclick="closeModal()">FECHAR</button>
    </div>

    <div id="m-card" class="modal-content" style="display:none">
        <h2>LEITOR DE CARTÃO</h2>
        <button onclick="loginProcess('ID-HT-1020', 'CARD')">NÍVEL 1</button>
        <button onclick="loginProcess('ID-BS-2030', 'CARD')">NÍVEL 2</button>
        <button onclick="loginProcess('ID-RR-3040', 'CARD')">NÍVEL 3</button>
        <button onclick="closeModal()">VOLTAR</button>
    </div>

    <div id="m-id" class="modal-content" style="display:none">
        <h2>ID MANUAL</h2>
        <input type="text" id="id-input" placeholder="ID DO FUNCIONÁRIO">
        <button onclick="loginID()">VERIFICAR</button>
        <button onclick="closeModal()">VOLTAR</button>
    </div>

    <div id="m-geo" class="modal-content" style="display:none">
        <h2>TRIANGULANDO POSIÇÃO...</h2>
        <div id="geo-steps" style="font-size: 0.6rem; color: gold; text-align: left; margin-bottom: 10px;"></div>
        <div style="width: 100%; border: 1px solid #333; height: 10px; margin: 15px 0;">
            <div id="p-bar" style="width: 0%; height: 100%; background: var(--primary-green); transition: width 0.1s;"></div>
        </div>
        <p style="font-size: 0.7rem;">VALIDANDO PERÍMETRO...</p>
    </div>
</div>

<div class="main-container">
    <div class="panel">
        <h2>LOGS</h2>
        <div id="logs" style="font-size: 0.6rem; overflow-y: auto; flex-grow: 1;"></div>
        <div id="admin-panel">
            <h2 style="color:gold">SISTEMA OVERRIDE</h2>
            <div id="admin-btns"></div>
        </div>
    </div>

    <div class="terminal-container">
        <div id="terminal-log">> AGUARDANDO COMANDO...</div>
        <div class="input-area">
            <button onclick="openModal('CARD')">💳 LOGIN CARTÃO</button>
            <button onclick="openModal('ID')">⌨️ LOGIN MANUAL</button>
            <button onclick="openModal('DB')">🗄️ DATABASE</button>
        </div>
    </div>

    <div class="panel">
        <h2>MONITOR ÓPTICO</h2>
        <div id="camera-box">
            <video id="webcam" autoplay playsinline></video>
            <div id="cam-txt">[ OFF ]</div>
        </div>
        
        <div id="face-choice-ui">
            <div style="font-size:0.5rem; margin-bottom:10px">RECONHECIMENTO FACIAL:</div>
            <button onclick="finishLogin()" style="color:var(--primary-green); border-color:var(--primary-green)">[ ACEITAR ]</button>
            <button onclick="failFaceID()" style="color:var(--error-red); border-color:var(--error-red)">[ REJEITAR ]</button>
        </div>

        <div id="lock-status" style="text-align:center; margin-top:20px; font-weight:bold; color:var(--error-red)">🔒 LOCKED</div>
        
        <button id="btn-panic" class="panic-btn" style="display:none" onclick="panicLogout()">🕶️ RETIRADA DE ÓCULOS</button>
        <button id="btn-out" style="display:none; margin-top:auto" onclick="logout()">LOGOFF</button>
    </div>
</div>

<canvas id="canvas" width="400" height="300" style="display:none"></canvas>

<script>
    const USERS = {
        "ID-HT-1020": { nome: "HEITOR TORRES", key: "ht", nv: 1 },
        "ID-BS-2030": { nome: "BEATRIZ SOARES", key: "bs", nv: 2 },
        "ID-RR-3040": { nome: "RICARDO ROCHA", key: "rr", nv: 3 }
    };

    let currentUser = null;
    let stream = null;
    let inactivityTimer = null;
    let cardRegistry = JSON.parse(localStorage.getItem('nexus_cards')) || {
        "ID-HT-1020": true, "ID-BS-2030": true, "ID-RR-3040": true
    };

    function save() { localStorage.setItem('nexus_cards', JSON.stringify(cardRegistry)); }
    function writeLog(t, err = false) {
        const l = document.getElementById('terminal-log');
        l.innerHTML += `<br><span style="color:${err ? 'var(--error-red)' : 'var(--primary-green)'}">> ${t}</span>`;
        l.scrollTop = l.scrollHeight;
    }

    function resetTimer() {
        if (!currentUser) return;
        clearTimeout(inactivityTimer);
        inactivityTimer = setTimeout(() => { writeLog("TIMEOUT DE 2 MIN.", true); logout(); }, 120000); 
    }
    window.onmousemove = resetTimer;

    function openModal(m) {
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('m-db-auth').style.display = (m === 'DB') ? 'block' : 'none';
        document.getElementById('m-card').style.display = (m === 'CARD') ? 'block' : 'none';
        document.getElementById('m-id').style.display = (m === 'ID') ? 'block' : 'none';
        document.getElementById('m-db-view').style.display = 'none';
        document.getElementById('m-geo').style.display = 'none';
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    function loginID() {
        const val = document.getElementById('id-input').value.toUpperCase().trim();
        if (USERS[val]) { loginProcess(val, 'ID'); } 
        else { writeLog("ID NÃO EXISTE.", true); }
    }

    async function loginProcess(id, type) {
        if (type === 'CARD' && !cardRegistry[id]) {
            writeLog(`CARTÃO ${id} DESATIVADO!`, true);
            closeModal(); return;
        }

        currentUser = { ...USERS[id], id: id };
        document.getElementById('m-card').style.display = 'none';
        document.getElementById('m-id').style.display = 'none';
        document.getElementById('m-geo').style.display = 'block';

        const tasks = ["SCANNING IP...", "LOCATION SYNC...", "SECURITY CHECK..."];
        for (let i = 0; i < tasks.length; i++) {
            document.getElementById('geo-steps').innerHTML += `> ${tasks[i]}<br>`;
            document.getElementById('p-bar').style.width = ((i + 1) * 33) + "%";
            await new Promise(r => setTimeout(r, 600));
        }

        closeModal();
        startFaceID();
    }

    async function startFaceID() {
        const v = document.getElementById('webcam');
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: true });
            v.srcObject = stream; v.style.display = 'block';
            document.getElementById('cam-txt').style.display = 'none';
            document.getElementById('face-choice-ui').style.display = 'block';
            writeLog("AGUARDANDO BIOMETRIA FACIAL...");
        } catch(e) { writeLog("FALHA NA CÂMERA.", true); }
    }

    function failFaceID() {
        writeLog("ERRO: FACE NÃO RECONHECIDA!", true);
        setTimeout(logout, 1000);
    }

    function finishLogin() {
        document.getElementById('face-choice-ui').style.display = 'none';
        document.getElementById('lock-status').innerHTML = "🔓 ACESSO LIBERADO";
        document.getElementById('lock-status').style.color = "var(--primary-green)";
        document.getElementById('btn-out').style.display = 'block';
        document.getElementById('btn-panic').style.display = 'block';
        
        if (currentUser.nv >= 2) { 
            document.getElementById('admin-panel').style.display = 'block'; 
            updateAdmin(); 
        }
        
        writeLog(`BEM-VINDO: ${currentUser.nome}`);
        addLog(`${currentUser.nome} autenticou.`);
        resetTimer();
    }

    function updateAdmin() {
        const c = document.getElementById('admin-btns'); c.innerHTML = '';
        Object.keys(cardRegistry).forEach(id => {
            const active = cardRegistry[id];
            // REGRA: Nível 2 não pode desativar Nível 3
            const canEdit = currentUser.nv >= USERS[id].nv;
            
            c.innerHTML += `<div style="margin-bottom:8px">
                <span style="font-size:0.5rem">${USERS[id].nome} (NV${USERS[id].nv})</span>
                <button onclick="toggleStatus('${id}')" 
                    ${!canEdit ? 'disabled' : ''}
                    style="width:auto; padding:2px 8px; float:right; ${active ? '' : 'color:red; border-color:red'}">
                    ${active ? 'ON' : 'OFF'}
                </button><div style="clear:both"></div></div>`;
        });
    }

    function toggleStatus(id) {
        cardRegistry[id] = !cardRegistry[id];
        save(); updateAdmin();
        writeLog(`MODIFICAÇÃO: ${id} AGORA É ${cardRegistry[id] ? 'ATIVO' : 'INATIVO'}`);
    }

    function panicLogout() {
        writeLog("ALERTA: ÓCULOS REMOVIDOS. SESSÃO ENCERRADA.", true);
        setTimeout(logout, 800);
    }

    // --- DB & OUTROS ---
    function verifyDB() {
        if (document.getElementById('db-pass').value === "senha1234") {
            document.getElementById('m-db-auth').style.display = 'none';
            document.getElementById('m-db-view').style.display = 'block';
            renderDB();
        } else { writeLog("ACESSO NEGADO!", true); closeModal(); }
        document.getElementById('db-pass').value = "";
    }

    function renderDB() {
        const d = document.getElementById('db-list'); d.innerHTML = '';
        Object.keys(USERS).forEach(id => {
            const img = localStorage.getItem('photo-' + USERS[id].key);
            d.innerHTML += `<div class="db-item">
                ${img ? `<img src="${img}" class="captured-photo">` : '<div style="height:70px; background:#222"></div>'}
                ${USERS[id].nome}<br><button onclick="openCap('${id}')" style="font-size:0.4rem">FOTO</button>
            </div>`;
        });
    }

    async function openCap(id) {
        capId = id; document.getElementById('cap-ui').style.display = 'block';
        const v = document.getElementById('v-db');
        const s = await navigator.mediaDevices.getUserMedia({ video: true });
        v.srcObject = s;
    }

    function savePhoto() {
        const v = document.getElementById('v-db');
        const c = document.getElementById('canvas');
        const ctx = c.getContext('2d');
        ctx.translate(400, 0); ctx.scale(-1, 1);
        ctx.drawImage(v, 0, 0, 400, 300);
        localStorage.setItem('photo-' + USERS[capId].key, c.toDataURL('image/png'));
        renderDB();
        v.srcObject.getTracks().forEach(t => t.stop());
    }

    function addLog(m) {
        let h = JSON.parse(localStorage.getItem('nexus_h')) || [];
        h.unshift(`[${new Date().toLocaleTimeString()}] ${m}`);
        localStorage.setItem('nexus_h', JSON.stringify(h.slice(0,20)));
        loadLogs();
    }
    function loadLogs() { document.getElementById('logs').innerHTML = (JSON.parse(localStorage.getItem('nexus_h')) || []).join('<br>'); }
    function logout() { if(stream) stream.getTracks().forEach(t => t.stop()); location.reload(); }
</script>
</body>
</html>
