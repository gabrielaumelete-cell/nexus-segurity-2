                <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Security Assistant</title>
    <style>
        :root {
            --primary-green: #00ff41;
            --dark-bg: #0a0a0a;
            --panel-bg: #111;
            --border-style: 1px solid #222;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--primary-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        .main-container {
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            gap: 10px;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        /* Painéis Laterais */
        .panel {
            background: var(--panel-bg);
            border: var(--border-style);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h2 { font-size: 0.9rem; border-bottom: 1px solid #333; padding-bottom: 5px; margin: 0; }

        /* Terminal Central */
        .terminal-container {
            border: var(--border-style);
            background: black;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #terminal-log {
            flex-grow: 1;
            padding: 20px;
            font-size: 0.85rem;
            line-height: 1.4;
            overflow-y: auto;
        }

        .input-area {
            padding: 20px;
            border-top: var(--border-style);
            text-align: center;
        }

        input {
            background: transparent;
            border: 1px solid var(--primary-green);
            color: var(--primary-green);
            padding: 10px;
            width: 80%;
            margin-bottom: 10px;
            outline: none;
        }

        button {
            background: var(--primary-green);
            color: black;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            width: 85%;
        }

        button:hover { opacity: 0.8; }

        /* Estilos de Status */
        .status-item { font-size: 0.7rem; margin-bottom: 10px; color: #666; }
        .status-val { color: var(--primary-green); float: right; }
        
        #face-scanner {
            width: 100%;
            height: 150px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #050505;
        }

        .scanning-line {
            width: 100%;
            height: 2px;
            background: var(--primary-green);
            position: absolute;
            top: 0;
            animation: scan 2s infinite linear;
            box-shadow: 0 0 15px var(--primary-green);
            display: none;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="main-container">
    <div class="panel">
        <div>
            <h2>SYSTEM STATUS</h2>
            <div class="status-item">NODE: <span class="status-val">GS-CENTRAL-01</span></div>
            <div class="status-item">ENCRYPTION: <span class="status-val">AES-256-GCM</span></div>
        </div>
        <div>
            <h2>ACCESS LOGS</h2>
            <div id="access-history" style="font-size: 0.65rem;">
                [14:32:01] System Standby...
            </div>
        </div>
    </div>

    <div class="terminal-container">
        <div id="terminal-log">
            > BIOS_STATUS: OK <br>
            > WAITING_FOR_INPUT... <br>
            > POR FAVOR, INSIRA O CARTÃO OU DIGITE O ID MANUAL.
        </div>
        
        <div class="input-area">
            <input type="text" id="user-input" placeholder="DIGITE O ID..." autocomplete="off">
            <button onclick="processInput()">LER CARTÃO / ENTRAR</button>
            <div style="font-size: 0.6rem; margin-top: 10px; color: #444;">UNIFIED SECURITY INTERFACE</div>
        </div>
    </div>

    <div class="panel">
        <div>
            <h2>RECONHECIMENTO</h2>
            <div id="face-scanner">
                <div class="scanning-line" id="scanner-line"></div>
                <span id="scan-text" style="font-size: 0.6rem;">AGUARDANDO ID</span>
            </div>
        </div>
        <div>
            <h2>SECURITY STATUS</h2>
            <div id="lock-status" style="color: red;">🔒 LOCKED</div>
            <div id="user-info" style="font-size: 0.7rem; margin-top: 10px;"></div>
        </div>
    </div>
</div>

<script>
    const USERS = {
        "ID-HT-1020": { nome: "Heitor Torres", cargo: "PRODUÇÃO", nv: 1 },
        "ID-BS-2030": { nome: "Beatriz Soares", cargo: "GERENTE", nv: 2 },
        "ID-RR-3040": { nome: "Ricardo Rocha", cargo: "CHEFE", nv: 3 }
    };

    const log = document.getElementById('terminal-log');
    const input = document.getElementById('user-input');
    const scannerLine = document.getElementById('scanner-line');
    const scanText = document.getElementById('scan-text');
    const lockStatus = document.getElementById('lock-status');
    const userInfo = document.getElementById('user-info');

    function addLog(text) {
        log.innerHTML += `<br>> ${text}`;
        log.scrollTop = log.scrollHeight;
    }

    function processInput() {
        const id = input.value.toUpperCase();
        if (USERS[id]) {
            startAuth(USERS[id]);
        } else {
            addLog("<span style='color:red;'>ERRO: ID INVÁLIDO OU CARTÃO NÃO RECONHECIDO.</span>");
        }
        input.value = "";
    }

    function startAuth(user) {
        addLog(`ID DETECTADO: ${user.nome}`);
        addLog("INICIANDO SCANNER FACIAL...");
        
        // Ativa animação visual
        scannerLine.style.display = "block";
        scanText.innerText = "ESCANEANDO...";
        scanText.classList.add("blink");

        setTimeout(() => {
            completeAuth(user);
        }, 3000); // Simula 3 segundos de scan
    }

    function completeAuth(user) {
        scannerLine.style.display = "none";
        scanText.innerText = "MATCH 100%";
        scanText.classList.remove("blink");
        
        lockStatus.innerHTML = "🔓 UNLOCKED";
        lockStatus.style.color = "var(--primary-green)";
        
        userInfo.innerHTML = `USUÁRIO: ${user.nome}<br>CARGO: ${user.cargo}<br>NÍVEL: ${user.nv}`;
        
        addLog(`ACESSO CONCEDIDO: NÍVEL ${user.nv}`);
        addLog(`BEM-VINDO, ${user.nome}.`);

        // Atualiza Histórico Lateral
        const history = document.getElementById('access-history');
        const now = new Date().toLocaleTimeString();
        history.innerHTML = `[${now}] ${user.nome} LOGGED IN<br>` + history.innerHTML;
    }
</script>

</body>
</html>
