<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Security Assistant</title>
    <style>
        :root {
            --primary-green: #00ff41;
            --error-red: #ff0033;
            --dark-bg: #0a0a0a;
            --panel-bg: #111;
            --border-style: 1px solid #222;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--primary-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        .main-container {
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            gap: 10px;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        .panel {
            background: var(--panel-bg);
            border: var(--border-style);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h2 { font-size: 0.8rem; border-bottom: 1px solid #333; padding-bottom: 5px; margin: 0; }

        .terminal-container {
            border: var(--border-style);
            background: black;
            display: flex;
            flex-direction: column;
        }

        #terminal-log {
            flex-grow: 1;
            padding: 20px;
            font-size: 0.8rem;
            line-height: 1.5;
            overflow-y: auto;
        }

        .input-area {
            padding: 20px;
            border-top: var(--border-style);
            text-align: center;
            background: #050505;
        }

        button {
            background: transparent;
            color: var(--primary-green);
            border: 1px solid var(--primary-green);
            padding: 10px;
            cursor: pointer;
            width: 85%;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.7rem;
        }

        button:hover { background: var(--primary-green); color: black; }
        .btn-error { border-color: var(--error-red); color: var(--error-red); }

        /* MODAL */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #000;
            border: 1px solid var(--primary-green);
            padding: 30px;
            text-align: center;
            width: 500px; /* Aumentado para caber o chefe */
        }

        input {
            background: #111;
            border: 1px solid var(--primary-green);
            color: var(--primary-green);
            padding: 10px;
            width: 90%;
            margin-bottom: 15px;
            text-align: center;
            outline: none;
        }

        /* CAMERA */
        #camera-container {
            width: 100%; height: 180px;
            border: 1px solid #222;
            position: relative;
            background: #000;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        #webcam-view {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: grayscale(1) brightness(0.7);
            transform: scaleX(-1);
            display: none;
        }

        /* BANCO DE DADOS GESTÃO */
        .db-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; /* Três colunas agora */
            gap: 10px;
            margin-top: 15px;
        }

        .db-item {
            border: 1px solid #333;
            padding: 8px;
            font-size: 0.55rem;
            background: #050505;
        }

        .captured-photo {
            width: 100%;
            height: 70px;
            background: #222;
            margin-bottom: 5px;
            object-fit: cover;
            border: 1px solid #444;
        }

        #capture-zone {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 15px;
            border-top: 1px solid #333;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div id="modal-overlay">
    <div id="step-db-auth" class="modal-content" style="display: none;">
        <h2>ACESSO RESTRITO - DATABASE</h2>
        <input type="password" id="db-pass-input" placeholder="CHAVE MESTRA">
        <button onclick="verifyDBPass()">ACESSAR REGISTROS</button>
        <button onclick="closeModal()" style="border:none; color:#555">CANCELAR</button>
    </div>

    <div id="step-db-view" class="modal-content" style="display: none;">
        <h2>SISTEMA DE ARQUIVOS ÓPTICOS</h2>
        <div class="db-grid">
            <div class="db-item">
                <img id="photo-ht" class="captured-photo" src="" style="display:none">
                <div id="placeholder-ht" style="height:70px; line-height:70px; color:#222">[ SEM DADOS ]</div>
                <button onclick="prepareCapture('ID-HT-1020')" style="width:100%; font-size:0.4rem">REGISTRAR</button>
                HEITOR (NV 1)
            </div>
            <div class="db-item">
                <img id="photo-bs" class="captured-photo" src="" style="display:none">
                <div id="placeholder-bs" style="height:70px; line-height:70px; color:#222">[ SEM DADOS ]</div>
                <button onclick="prepareCapture('ID-BS-2030')" style="width:100%; font-size:0.4rem">REGISTRAR</button>
                BEATRIZ (NV 2)
            </div>
            <div class="db-item">
                <img id="photo-rr" class="captured-photo" src="" style="display:none">
                <div id="placeholder-rr" style="height:70px; line-height:70px; color:#222">[ SEM DADOS ]</div>
                <button onclick="prepareCapture('ID-RR-3040')" style="width:100%; font-size:0.4rem">REGISTRAR</button>
                RICARDO (NV 3)
            </div>
        </div>

        <div id="capture-zone">
            <div style="width:200px; height:130px; border:1px solid var(--primary-green); overflow:hidden">
                <video id="db-webcam" autoplay playsinline style="width:100%; height:100%; object-fit:cover; transform: scaleX(-1);"></video>
            </div>
            <button onclick="takeSnapshot()" style="margin-top:10px; background:var(--primary-green); color:black">SALVAR REGISTRO</button>
        </div>
        <button onclick="closeModal()" style="margin-top:20px; color:#555">SAIR</button>
    </div>

    <div id="step-card" class="modal-content" style="display: none;">
        <h2>LEITORA DE CARTÃO</h2>
        <button onclick="processLogin('ID-HT-1020')">ID-HT-1020 (HEITOR)</button>
        <button onclick="processLogin('ID-BS-2030')">ID-BS-2030 (BEATRIZ)</button>
        <button onclick="processLogin('ID-RR-3040')">ID-RR-3040 (RICARDO)</button>
        <button onclick="closeModal()" style="border:none; color:#555">CANCELAR</button>
    </div>

    <div id="step-id-manual" class="modal-content" style="display: none;">
        <h2>TERMINAL DE ID</h2>
        <input type="text" id="input-manual-id" placeholder="EX: ID-RR-3040">
        <button onclick="checkManualID()">PESQUISAR ID</button>
        <button onclick="closeModal()" style="border:none; color:#555">VOLTAR</button>
    </div>

    <div id="step-confirm" class="modal-content" style="display: none;">
        <h2>VALIDAÇÃO DE IDENTIDADE</h2>
        <div id="employee-data-display" style="text-align: left; font-size: 0.75rem; border: 1px dashed var(--primary-green); padding: 15px; margin-bottom: 15px; background:#050505"></div>
        <button id="scan-init-btn" onclick="triggerFaceScanUI()">INICIAR SCANNER ÓPTICO</button>
        <button onclick="closeModal()" style="border:none; color:#555">CANCELAR</button>
    </div>
</div>

<div class="main-container">
    <div class="panel">
        <h2>LOG DE ACESSOS</h2>
        <div id="history-log" style="font-size: 0.5rem;"></div>
    </div>

    <div class="terminal-container">
        <div id="terminal-log">> SISTEMA ONLINE...</div>
        <div class="input-area">
            <button onclick="openModal('CARD')">💳 CARTÃO</button>
            <button onclick="openModal('ID')">⌨️ DIGITAR ID</button>
            <button onclick="openModal('DB')" style="border-color:#444; color:#444">🗄️ DATABASE</button>
        </div>
    </div>

    <div class="panel">
        <h2>SCANNER STATUS</h2>
        <div id="camera-container">
            <video id="webcam-view" autoplay playsinline></video>
            <div id="cam-placeholder" style="color:#222">[ OFFLINE ]</div>
        </div>
        <div id="sim-controls" style="display:none; justify-content:space-between; margin-top:10px">
            <button onclick="finalize()" style="width:48%">CONCORDAR</button>
            <button onclick="logout()" class="btn-error" style="width:48%">RECUSAR</button>
        </div>
        <div id="lock-ui" style="color:red; text-align:center; margin-top:10px">🔒 SISTEMA TRANCADO</div>
        <button id="btn-logoff" onclick="logout()" style="display:none; margin-top:auto">LOGOFF</button>
    </div>
</div>

<canvas id="hidden-canvas" style="display:none" width="400" height="300"></canvas>

<script>
    let camStream = null;
    let targetId = '';
    let currentUser = null;

    const USERS = {
        "ID-HT-1020": { nome: "HEITOR TORRES", key: "ht" },
        "ID-BS-2030": { nome: "BEATRIZ SOARES", key: "bs" },
        "ID-RR-3040": { nome: "RICARDO ROCHA", key: "rr" }
    };

    function writeLog(msg, isError = false) {
        const log = document.getElementById('terminal-log');
        log.innerHTML += `<br><span style="color:${isError ? 'var(--error-red)' : 'var(--primary-green)'}">> ${msg}</span>`;
        log.scrollTop = log.scrollHeight;
    }

    window.onload = () => {
        ['ht', 'bs', 'rr'].forEach(key => {
            const saved = localStorage.getItem('photo-' + key);
            if(saved) {
                document.getElementById('photo-' + key).src = saved;
                document.getElementById('photo-' + key).style.display = 'block';
                document.getElementById('placeholder-' + key).style.display = 'none';
            }
        });
    };

    function openModal(type) {
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('step-db-auth').style.display = type === 'DB' ? 'block' : 'none';
        document.getElementById('step-card').style.display = type === 'CARD' ? 'block' : 'none';
        document.getElementById('step-id-manual').style.display = type === 'ID' ? 'block' : 'none';
        document.getElementById('step-db-view').style.display = 'none';
        document.getElementById('step-confirm').style.display = 'none';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        stopCamera();
    }

    function verifyDBPass() {
        if (document.getElementById('db-pass-input').value === "senha1234") {
            document.getElementById('step-db-auth').style.display = 'none';
            document.getElementById('step-db-view').style.display = 'block';
            writeLog("ACESSO AO DB CONCEDIDO.");
        } else {
            writeLog("CHAVE INCORRETA.", true);
            closeModal();
        }
    }

    function checkManualID() {
        const id = document.getElementById('input-manual-id').value.toUpperCase().trim();
        if (USERS[id]) processLogin(id);
        else writeLog("ID NÃO ENCONTRADO.", true);
    }

    function processLogin(id) {
        currentUser = USERS[id];
        currentUser.id = id;
        document.getElementById('step-card').style.display = 'none';
        document.getElementById('step-id-manual').style.display = 'none';
        document.getElementById('step-confirm').style.display = 'block';
        document.getElementById('employee-data-display').innerHTML = `FUNCIONÁRIO: ${currentUser.nome}<br>REGISTRO: ${currentUser.id}<br>CARGO: CHEFIA/OPERACIONAL`;
    }

    async function triggerFaceScanUI() {
        const hasPhoto = localStorage.getItem('photo-' + currentUser.key);
        if(!hasPhoto) {
            writeLog("ERRO: FUNCIONÁRIO SEM REGISTRO FOTOGRÁFICO!", true);
            return;
        }
        closeModal();
        const mainVid = document.getElementById('webcam-view');
        camStream = await navigator.mediaDevices.getUserMedia({ video: true });
        mainVid.srcObject = camStream;
        mainVid.style.display = 'block';
        document.getElementById('cam-placeholder').style.display = 'none';
        document.getElementById('sim-controls').style.display = 'flex';
        writeLog(`IA: VALIDANDO IMAGEM DE ${currentUser.nome}...`);
    }

    async function prepareCapture(id) {
        targetId = id;
        document.getElementById('capture-zone').style.display = 'flex';
        const video = document.getElementById('db-webcam');
        camStream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = camStream;
    }

    function takeSnapshot() {
        const video = document.getElementById('db-webcam');
        const canvas = document.getElementById('hidden-canvas');
        const context = canvas.getContext('2d');
        context.translate(canvas.width, 0);
        context.scale(-1, 1);
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        const dataURL = canvas.toDataURL('image/png');
        const userKey = USERS[targetId].key;
        localStorage.setItem('photo-' + userKey, dataURL);
        const img = document.getElementById('photo-' + userKey);
        img.src = dataURL; img.style.display = 'block';
        document.getElementById('placeholder-' + userKey).style.display = 'none';
        writeLog(`REGISTRO ATUALIZADO: ${targetId}`);
        document.getElementById('capture-zone').style.display = 'none';
        stopCamera();
    }

    function stopCamera() {
        if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
    }

    function finalize() {
        document.getElementById('lock-ui').innerHTML = "🔓 ACESSO LIBERADO";
        document.getElementById('lock-ui').style.color = "var(--primary-green)";
        document.getElementById('btn-logoff').style.display = 'block';
        document.getElementById('sim-controls').style.display = 'none';
        writeLog(`SESSÃO INICIADA: ${currentUser.nome}`);
        const history = document.getElementById('history-log');
        history.innerHTML = `[${new Date().toLocaleTimeString()}] ${currentUser.id} IN<br>` + history.innerHTML;
    }

    function logout() {
        stopCamera();
        location.reload();
    }
</script>
</body>
</html>
