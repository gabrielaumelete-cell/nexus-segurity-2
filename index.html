
    <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Security Assistant</title>
    <style>
        :root {
            --primary-green: #00ff41;
            --dark-bg: #0a0a0a;
            --panel-bg: #111;
            --border-style: 1px solid #222;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--primary-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        .main-container {
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            gap: 10px;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        .panel {
            background: var(--panel-bg);
            border: var(--border-style);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h2 { font-size: 0.9rem; border-bottom: 1px solid #333; padding-bottom: 5px; margin: 0; }

        .terminal-container {
            border: var(--border-style);
            background: black;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #terminal-log {
            flex-grow: 1;
            padding: 20px;
            font-size: 0.85rem;
            line-height: 1.4;
            overflow-y: auto;
        }

        .input-area {
            padding: 20px;
            border-top: var(--border-style);
            text-align: center;
        }

        button {
            background: var(--primary-green);
            color: black;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: bold;
            width: 85%;
            margin-bottom: 10px;
        }

        /* --- MODAL (TUDO NA MESMA ABA) --- */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #111;
            border: 2px solid var(--primary-green);
            padding: 30px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.1);
        }

        .card-selection {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .card-item {
            border: 1px solid var(--primary-green);
            padding: 15px;
            cursor: pointer;
            width: 120px;
            transition: 0.2s;
        }

        .card-item:hover { background: var(--primary-green); color: black; }

        /* Ficha de Dados */
        .data-sheet {
            text-align: left;
            margin: 25px 0;
            padding: 20px;
            border: 1px dashed var(--primary-green);
            background: #050505;
        }

        .data-line { margin-bottom: 10px; font-size: 1rem; }
        .label { color: #666; font-size: 0.7rem; display: block; margin-bottom: 2px; }

        /* Scanner */
        #face-scanner {
            width: 100%; height: 150px; border: 1px solid #333;
            display: flex; align-items: center; justify-content: center;
            position: relative; background: #050505; overflow: hidden;
        }
        .scanning-line {
            width: 100%; height: 2px; background: var(--primary-green);
            position: absolute; top: 0; animation: scan 2s infinite linear;
            display: none; box-shadow: 0 0 10px var(--primary-green);
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>

<div id="modal-overlay">
    <div id="step-selection" class="modal-content">
        <h2>LEITOR DE CARTÃO</h2>
        <p style="font-size: 0.7rem; color: #666;">APROXIME UM CARTÃO DO SENSOR</p>
        <div class="card-selection">
            <div class="card-item" onclick="showData('ID-HT-1020')">NV 1<br>HEITOR</div>
            <div class="card-item" onclick="showData('ID-BS-2030')">NV 2<br>BEATRIZ</div>
            <div class="card-item" onclick="showData('ID-RR-3040')">NV 3<br>RICARDO</div>
        </div>
        <button onclick="closeAll()" style="background: #333; color: #999; margin-top: 20px; width: 50%;">SAIR</button>
    </div>

    <div id="step-data" class="modal-content" style="display: none;">
        <h2 style="color: var(--primary-green)">VERIFICAÇÃO DE PERFIL</h2>
        <div id="employee-info" class="data-sheet">
            </div>
        <button id="btn-confirm" onclick="startFinalAuth()">🔓 CONFIRMAR IDENTIDADE</button>
        <button onclick="backToSelection()" style="background: #333; color: #999; width: 50%;">VOLTAR</button>
    </div>
</div>

<div class="main-container">
    <div class="panel">
        <h2>SYSTEM STATUS</h2>
        <div style="font-size: 0.7rem; margin-top:10px;">ENCRYPTION: <span style="color:var(--primary-green)">ACTIVE</span></div>
        <div id="access-history" style="font-size: 0.65rem; margin-top: 20px;"></div>
    </div>

    <div class="terminal-container">
        <div id="terminal-log">
            > NEXUS SECURITY ASSISTANT v2.5 <br>
            > STATUS: AGUARDANDO AUTENTICAÇÃO...
        </div>
        <div class="input-area">
            <button onclick="openInterface()">💳 ACESSAR LEITOR</button>
        </div>
    </div>

    <div class="panel">
        <h2>SECURITY</h2>
        <div id="face-scanner">
            <div class="scanning-line" id="scanner-line"></div>
            <span id="scan-text" style="font-size: 0.6rem;">OFFLINE</span>
        </div>
        <div id="lock-status" style="color: red; text-align: center; margin-top: 15px; font-weight: bold;">🔒 LOCKED</div>
        <div id="final-user-data" style="font-size: 0.7rem; line-height: 1.5;"></div>
    </div>
</div>

<script>
    const USERS = {
        "ID-HT-1020": { nome: "HEITOR TORRES", cargo: "PRODUÇÃO", id: "HT-1020", nivel: "1" },
        "ID-BS-2030": { nome: "BEATRIZ SOARES", cargo: "GERENTE", id: "BS-2030", nivel: "2" },
        "ID-RR-3040": { nome: "RICARDO ROCHA", cargo: "CHEFE", id: "RR-3040", nivel: "3" }
    };

    let selectedUser = null;

    function openInterface() {
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('step-selection').style.display = 'block';
        document.getElementById('step-data').style.display = 'none';
    }

    function closeAll() {
        document.getElementById('modal-overlay').style.display = 'none';
    }

    function showData(userId) {
        selectedUser = USERS[userId];
        // Esconde a seleção e mostra os dados na mesma caixa
        document.getElementById('step-selection').style.display = 'none';
        document.getElementById('step-data').style.display = 'block';
        
        document.getElementById('employee-info').innerHTML = `
            <div class="data-line"><span class="label">NOME DO FUNCIONÁRIO:</span> ${selectedUser.nome}</div>
            <div class="data-line"><span class="label">CARGO:</span> ${selectedUser.cargo}</div>
            <div class="data-line"><span class="label">ID DE REGISTRO:</span> ${selectedUser.id}</div>
            <div class="data-line"><span class="label">NÍVEL DE ACESSO:</span> 0${selectedUser.nivel}</div>
        `;
    }

    function backToSelection() {
        document.getElementById('step-data').style.display = 'none';
        document.getElementById('step-selection').style.display = 'block';
    }

    function startFinalAuth() {
        closeAll();
        const log = document.getElementById('terminal-log');
        log.innerHTML += `<br>> DADOS CONFIRMADOS PARA ${selectedUser.id}`;
        log.innerHTML += `<br>> INICIANDO RECONHECIMENTO FACIAL...`;
        
        // Ativa o scanner visual no painel lateral
        document.getElementById('scanner-line').style.display = 'block';
        document.getElementById('scan-text').innerText = 'SCANNING...';
        
        setTimeout(() => {
            document.getElementById('scanner-line').style.display = 'none';
            document.getElementById('scan-text').innerText = 'CONFIRMADO';
            document.getElementById('lock-status').innerHTML = "🔓 UNLOCKED";
            document.getElementById('lock-status').style.color = "var(--primary-green)";
            
            document.getElementById('final-user-data').innerHTML = `
                <hr style="border:0; border-top:1px solid #222; margin:10px 0;">
                USUÁRIO: ${selectedUser.nome}<br>
                CARGO: ${selectedUser.cargo}<br>
                ACESSO NÍVEL 0${selectedUser.nivel} ATIVO.
            `;
            
            log.innerHTML += `<br>> ACESSO CONCEDIDO. BEM-VINDO.`;

            // Adiciona ao log histórico da esquerda
            const history = document.getElementById('access-history');
            history.innerHTML = `[${new Date().toLocaleTimeString()}] ${selectedUser.id} OK<br>` + history.innerHTML;
        }, 2000);
    }
</script>
</body>
</html>
