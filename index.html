<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Security Assistant</title>
    <style>
        :root {
            --primary-green: #00ff41;
            --dark-bg: #0a0a0a;
            --panel-bg: #111;
            --border-style: 1px solid #222;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--primary-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        .main-container {
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            gap: 10px;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        .panel {
            background: var(--panel-bg);
            border: var(--border-style);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h2 { font-size: 0.8rem; border-bottom: 1px solid #333; padding-bottom: 5px; margin: 0; }

        .terminal-container {
            border: var(--border-style);
            background: black;
            display: flex;
            flex-direction: column;
        }

        #terminal-log {
            flex-grow: 1;
            padding: 20px;
            font-size: 0.8rem;
            line-height: 1.5;
            overflow-y: auto;
        }

        .input-area {
            padding: 20px;
            border-top: var(--border-style);
            text-align: center;
            background: #050505;
        }

        button {
            background: transparent;
            color: var(--primary-green);
            border: 1px solid var(--primary-green);
            padding: 10px;
            cursor: pointer;
            width: 85%;
            margin-bottom: 10px;
            font-weight: bold;
        }

        button:hover { background: var(--primary-green); color: black; }

        /* MODAL */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #000;
            border: 1px solid var(--primary-green);
            padding: 30px;
            text-align: center;
            width: 350px;
        }

        input {
            background: #111;
            border: 1px solid var(--primary-green);
            color: var(--primary-green);
            padding: 10px;
            width: 90%;
            margin-bottom: 15px;
            text-align: center;
            outline: none;
        }

        #face-scanner {
            width: 100%; height: 120px; border: 1px solid #222;
            display: flex; align-items: center; justify-content: center;
            position: relative; background: #050505; overflow: hidden;
        }

        .scanning-line {
            width: 100%; height: 2px; background: var(--primary-green);
            position: absolute; top: 0; animation: scan 2s infinite linear;
            display: none;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>

<div id="modal-overlay">
    <div id="step-card" class="modal-content" style="display: none;">
        <h2>APROXIME O CARTÃO</h2>
        <button onclick="processLogin('ID-HT-1020', 'CARD')">HEITOR (NV 1)</button>
        <button onclick="processLogin('ID-BS-2030', 'CARD')">BEATRIZ (NV 2)</button>
        <button onclick="processLogin('ID-RR-3040', 'CARD')">RICARDO (NV 3)</button>
        <button onclick="closeModal()" style="border:none; color: #555;">FECHAR</button>
    </div>

    <div id="step-manual" class="modal-content" style="display: none;">
        <h2>LOGIN POR ID</h2>
        <p style="font-size: 0.6rem;">DIGITE O CÓDIGO (EX: ID-RR-3040)</p>
        <input type="text" id="manual-id-input" placeholder="ID-XXXX-0000">
        <button onclick="checkManualID()">VERIFICAR</button>
        <button onclick="closeModal()" style="border:none; color: #555;">VOLTAR</button>
    </div>

    <div id="step-confirm" class="modal-content" style="display: none;">
        <h2 id="confirm-title">DADOS DO PERFIL</h2>
        <div id="employee-data" style="text-align: left; font-size: 0.8rem; border: 1px dashed; padding: 10px; margin-bottom: 15px;"></div>
        <button onclick="executeAuth()">CONFIRMAR ENTRADA</button>
    </div>
</div>

<div class="main-container">
    <div class="panel">
        <h2>SYSTEM</h2>
        <div id="history-log" style="font-size: 0.6rem;"></div>
    </div>

    <div class="terminal-container">
        <div id="terminal-log">
            > SISTEMA PRONTO... <br>
            > AGUARDANDO LOGIN.
        </div>
        <div class="input-area">
            <button onclick="openModal('CARD')">💳 LER CARTÃO</button>
            <button onclick="openModal('MANUAL')">⌨️ DIGITAR ID</button>
        </div>
    </div>

    <div class="panel">
        <h2>SECURITY</h2>
        <div id="face-scanner">
            <div class="scanning-line" id="scanner-line"></div>
            <span id="scan-status" style="font-size: 0.6rem;">AGUARDANDO...</span>
        </div>
        <div id="lock-ui" style="color: red; text-align: center; margin-top: 10px;">🔒 LOCKED</div>
        <div id="user-display" style="font-size: 0.6rem;"></div>
    </div>
</div>

<script>
    // LISTA DE IDs VÁLIDOS
    const USERS = {
        "ID-HT-1020": { nome: "HEITOR TORRES", cargo: "PRODUÇÃO", nv: "1" },
        "ID-BS-2030": { nome: "BEATRIZ SOARES", cargo: "GERENTE", nv: "2" },
        "ID-RR-3040": { nome: "RICARDO ROCHA", cargo: "CHEFE", nv: "3" }
    };

    let currentUser = null;
    let loginMethod = '';

    function openModal(type) {
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('step-card').style.display = type === 'CARD' ? 'block' : 'none';
        document.getElementById('step-manual').style.display = type === 'MANUAL' ? 'block' : 'none';
        document.getElementById('step-confirm').style.display = 'none';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
    }

    // ESSA É A FUNÇÃO QUE VERIFICA O QUE VOCÊ DIGITA
    function checkManualID() {
        const inputVal = document.getElementById('manual-id-input').value.trim().toUpperCase();
        
        if (USERS[inputVal]) {
            processLogin(inputVal, 'MANUAL');
        } else {
            alert("ID INCORRETO! Tente: ID-HT-1020, ID-BS-2030 ou ID-RR-3040");
        }
    }

    function processLogin(id, method) {
        currentUser = USERS[id];
        currentUser.idCod = id; // Salva o ID usado
        loginMethod = method;

        document.getElementById('step-card').style.display = 'none';
        document.getElementById('step-manual').style.display = 'none';
        document.getElementById('step-confirm').style.display = 'block';

        document.getElementById('employee-data').innerHTML = `
            NOME: ${currentUser.nome}<br>
            CARGO: ${currentUser.cargo}<br>
            ID: ${id}<br>
            NÍVEL: ${currentUser.nv}
        `;
    }

    function executeAuth() {
        closeModal();
        const log = document.getElementById('terminal-log');
        log.innerHTML += `<br>> VALIDANDO ${currentUser.idCod}...`;

        if (loginMethod === 'MANUAL') {
            // LOGIN POR ID ATIVA SCANNER
            document.getElementById('scanner-line').style.display = 'block';
            document.getElementById('scan-status').innerText = 'ESCANEANDO FACE...';
            
            setTimeout(() => {
                document.getElementById('scanner-line').style.display = 'none';
                document.getElementById('scan-status').innerText = 'MATCH!';
                finalize();
            }, 2000);
        } else {
            // CARTÃO ENTRA DIRETO
            finalize();
        }
    }

    function finalize() {
        document.getElementById('lock-ui').innerHTML = "🔓 UNLOCKED";
        document.getElementById('lock-ui').style.color = "#00ff41";
        document.getElementById('user-display').innerHTML = `USUÁRIO: ${currentUser.nome}<br>ACESSO NÍVEL ${currentUser.nv} LIBERADO.`;
        document.getElementById('terminal-log').innerHTML += `<br>> ACESSO CONCEDIDO.`;
        
        const history = document.getElementById('history-log');
        history.innerHTML = `[${new Date().toLocaleTimeString()}] ${currentUser.idCod} OK<br>` + history.innerHTML;
    }
</script>
</body>
</html>
